<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildMySite — Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B2A4A;
      --navy-light: #243558;
      --gold: #C5A55A;
      --offwhite: #F8F7F4;
      --white: #FFFFFF;
      --text: #2C2C2C;
      --text-light: #5A5A5A;
      --text-muted: #8A8A8A;
      --teal: #2A7F7F;
      --teal-dark: #1F6363;
      --teal-light: #E8F4F4;
      --border: #E2E0DC;
      --border-light: #EEEDEA;
      --radius: 6px;
      --radius-lg: 12px;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body); font-size: 15px; line-height: 1.6;
      color: var(--text); background: var(--offwhite);
      display: flex; flex-direction: column;
    }
    a { color: var(--teal); text-decoration: none; }
    a:hover { color: var(--teal-dark); text-decoration: underline; }
    code { background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 3px; font-size: 0.88em; }

    /* ---- Header ---- */
    .header {
      background: var(--navy); color: var(--white);
      padding: 16px 24px; flex-shrink: 0;
      display: flex; align-items: center; gap: 16px;
    }
    .header__brand {
      font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700;
      color: var(--white); text-decoration: none;
    }
    .header__brand span { color: var(--gold); }
    .header__sub { font-size: 0.8rem; color: rgba(255,255,255,0.55); }

    /* ---- Progress bar ---- */
    .progress-bar {
      background: var(--navy-light); height: 4px; flex-shrink: 0;
    }
    .progress-bar__fill {
      height: 100%; background: var(--teal); width: 0%;
      transition: width 0.5s ease;
    }

    /* ---- Steps indicator ---- */
    .steps {
      display: flex; justify-content: center; gap: 6px;
      padding: 12px 24px; background: var(--white);
      border-bottom: 1px solid var(--border-light); flex-shrink: 0;
      flex-wrap: wrap;
    }
    .step-pip {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 4px 12px; border-radius: 99px;
      color: var(--text-muted); background: var(--offwhite);
      border: 1px solid var(--border-light); transition: all 0.3s;
    }
    .step-pip--active { color: var(--white); background: var(--teal); border-color: var(--teal); }
    .step-pip--done { color: var(--teal-dark); background: var(--teal-light); border-color: var(--teal); }

    /* ---- Messages area ---- */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 24px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ---- Message bubbles ---- */
    .msg {
      max-width: 560px; padding: 14px 18px; border-radius: var(--radius-lg);
      line-height: 1.65; font-size: 0.92rem; animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg--agent {
      align-self: flex-start; background: var(--white);
      border: 1px solid var(--border-light); color: var(--text);
    }
    .msg--user {
      align-self: flex-end; background: var(--teal); color: var(--white);
      border: 1px solid var(--teal-dark);
    }
    .msg--user a { color: var(--white); text-decoration: underline; }
    .msg--user code { background: rgba(255,255,255,0.2); color: var(--white); }
    .msg p { margin-bottom: 8px; }
    .msg p:last-child { margin-bottom: 0; }
    .msg strong { font-weight: 600; }

    /* ---- Cards inside messages ---- */
    .chat-card {
      background: var(--offwhite); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin: 4px 0;
    }
    .chat-card--success { background: #E8F5E9; border-color: #66BB6A; }
    .chat-card__title {
      font-weight: 700; font-size: 0.95rem; color: var(--navy); margin-bottom: 10px;
    }
    .chat-card__row {
      display: flex; gap: 10px; margin-bottom: 6px; font-size: 0.88rem;
    }
    .chat-card__label {
      font-weight: 600; color: var(--text-muted); min-width: 80px;
      text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.04em;
      padding-top: 2px;
    }
    .chat-card__value { color: var(--text); flex: 1; word-break: break-word; }
    .chat-steps { padding-left: 20px; margin: 8px 0; }
    .chat-steps li { margin-bottom: 6px; font-size: 0.88rem; color: var(--text-light); list-style: decimal; }
    .chat-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; }
    .chat-token {
      display: inline-block; background: var(--white); border: 1px solid var(--border);
      padding: 6px 10px; border-radius: var(--radius); font-family: monospace;
      font-size: 0.85rem; word-break: break-all; user-select: all;
    }
    .copy-btn {
      display: inline-block; margin-left: 8px; padding: 4px 10px; font-size: 0.75rem;
      background: var(--navy); color: var(--white); border: none; border-radius: var(--radius);
      cursor: pointer; font-family: var(--font-body); vertical-align: middle;
    }
    .copy-btn:hover { opacity: 0.85; }
    .chat-dns-table {
      width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.85rem;
    }
    .chat-dns-table th {
      text-align: left; font-weight: 600; color: var(--text-muted);
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 6px 8px; border-bottom: 1px solid var(--border);
    }
    .chat-dns-table td {
      padding: 6px 8px; border-bottom: 1px solid var(--border-light);
    }

    /* ---- Buttons in chat ---- */
    .msg-buttons { display: flex; gap: 8px; flex-wrap: wrap; align-self: flex-start; }
    .msg-btn {
      padding: 10px 20px; border-radius: var(--radius); border: 1px solid var(--teal);
      background: var(--white); color: var(--teal); font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block;
    }
    .msg-btn:hover { background: var(--teal); color: var(--white); text-decoration: none; }
    .msg-btn--primary { background: var(--teal); color: var(--white); }
    .msg-btn--primary:hover { background: var(--teal-dark); }

    /* ---- Build progress ---- */
    .build-progress { margin: 4px 0; align-self: flex-start; max-width: 560px; width: 100%; }
    .build-step {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid var(--border-light); font-size: 0.88rem;
    }
    .build-step:last-child { border-bottom: none; }
    .build-step__icon { width: 20px; height: 20px; flex-shrink: 0; }
    .build-step__icon--pending { color: var(--text-muted); }
    .build-step__icon--running { color: var(--gold); animation: spin 1s linear infinite; }
    .build-step__icon--done { color: #2E7D32; }
    .build-step__icon--error { color: #C62828; }
    .build-step__text { flex: 1; color: var(--text); }
    .build-step__detail { font-size: 0.78rem; color: var(--text-muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Page checklist ---- */
    .page-checklist { display: flex; flex-direction: column; gap: 6px; }
    .page-check {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border-radius: var(--radius); cursor: pointer; transition: background 0.15s;
      font-size: 0.9rem;
    }
    .page-check:hover { background: rgba(0,0,0,0.03); }
    .page-check input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--teal); cursor: pointer;
    }
    .page-check input[type="checkbox"]:disabled { opacity: 0.5; cursor: default; }
    .page-check__label { color: var(--text); font-weight: 500; }

    /* ---- Image upload ---- */
    .image-upload-group { display: flex; flex-direction: column; gap: 16px; }
    .image-upload-field { }
    .image-upload-label {
      display: block; font-weight: 600; font-size: 0.88rem;
      color: var(--navy); margin-bottom: 4px;
    }
    .image-upload-input {
      font-size: 0.85rem; color: var(--text-light);
    }
    .image-upload-hint {
      font-size: 0.78rem; color: var(--text-muted); margin-top: 2px;
    }

    /* ---- Input area ---- */
    .input-area {
      padding: 16px 24px; background: var(--white);
      border-top: 1px solid var(--border-light); flex-shrink: 0;
      display: none;
    }
    .input-area--visible { display: flex; gap: 10px; align-items: center; }
    .input-area__field {
      flex: 1; padding: 12px 16px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 0.95rem; font-family: monospace;
      background: var(--offwhite); color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    .input-area__field:focus { border-color: var(--teal); }
    .input-area__send {
      width: 44px; height: 44px; border: none; border-radius: var(--radius);
      background: var(--teal); color: var(--white); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0;
    }
    .input-area__send:hover { background: var(--teal-dark); }
    .input-area__send svg { width: 20px; height: 20px; }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      .messages { padding: 16px 12px 12px; }
      .msg { max-width: 100%; }
      .header { padding: 12px 16px; }
      .input-area { padding: 12px 12px; }
      .steps { padding: 8px 12px; }
    }
  </style>

  <script>
// ============================================================
// BuildMySite — Self-contained setup (inlined for file:// support)
// Source: scripts/build-setup.js
// ============================================================

(function() {
'use strict';

// ---- setup.js (API helpers) ----
// ============================================================
// BUILDMYSITE — API-Driven Setup Engine
// Runs client-side in the wizard. Creates the user's GitHub repo,
// Vercel project, pushes the site kit, sets env vars, triggers
// the initial AI build.
// All API calls use the user's own tokens — nothing touches EON.
// ============================================================

// ---- Site Kit file manifest ---------------------------------
// These are the files pushed to the user's new repo.
// Contents are loaded at build time from the site-kit directory.
// The wizard will inline these as a JS object.
// This module expects SITE_KIT_FILES to be set before use.
let SITE_KIT_FILES = null;

function setSiteKitFiles(files) {
  SITE_KIT_FILES = files;
}

// ---- GitHub API helpers -------------------------------------

async function githubApi(path, token, options = {}) {
  const r = await fetch(`https://api.github.com${path}`, {
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...options.headers
    },
    ...options
  });
  if (!r.ok) {
    const text = await r.text();
    throw new Error(`GitHub API ${r.status}: ${text}`);
  }
  return r.json();
}

// ---- GitHub Device Flow ------------------------------------

async function startGitHubDeviceFlow() {
  const r = await fetch('https://www.eonriskservices.com/api/github-device-code', { method: 'POST' });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error_description || data.error || 'Failed to start device flow');
  return data; // { device_code, user_code, verification_uri, expires_in, interval }
}

function pollGitHubToken(deviceCode, interval = 5) {
  return new Promise((resolve, reject) => {
    const poll = async () => {
      try {
        const r = await fetch('https://www.eonriskservices.com/api/github-poll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device_code: deviceCode }),
        });
        const data = await r.json();

        if (data.access_token) {
          resolve(data.access_token);
          return;
        }

        if (data.error === 'authorization_pending') {
          setTimeout(poll, interval * 1000);
          return;
        }

        if (data.error === 'slow_down') {
          interval += 5;
          setTimeout(poll, interval * 1000);
          return;
        }

        // expired_token, access_denied, or other error
        reject(new Error(data.error_description || data.error || 'Authorization failed'));
      } catch (err) {
        reject(err);
      }
    };
    poll();
  });
}

async function validateGitHubToken(token) {
  try {
    const user = await githubApi('/user', token);
    return { valid: true, login: user.login, name: user.name };
  } catch (e) {
    return { valid: false, error: e.message };
  }
}

async function createGitHubRepo(token, repoName) {
  const data = await githubApi('/user/repos', token, {
    method: 'POST',
    body: JSON.stringify({
      name: repoName,
      description: 'My website, built with BuildMySite',
      private: false,
      auto_init: false
    })
  });
  return { owner: data.owner.login, repo: data.full_name, url: data.html_url };
}

async function pushFileToRepo(token, repo, path, content, message) {
  // Check if file exists (to get SHA for update)
  let sha = null;
  try {
    const existing = await githubApi(`/repos/${repo}/contents/${path}`, token);
    sha = existing.sha;
  } catch {}

  const body = {
    message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: 'main'
  };
  if (sha) body.sha = sha;

  return githubApi(`/repos/${repo}/contents/${path}`, token, {
    method: 'PUT',
    body: JSON.stringify(body)
  });
}

async function pushSiteKit(token, repo, onProgress, selectedPages) {
  if (!SITE_KIT_FILES) throw new Error('Site kit files not loaded. Call setSiteKitFiles() first.');

  // Optional page templates that should only be pushed if the user selected them
  const optionalTemplates = {
    'gallery.html': 'gallery',
    'menu.html': 'menu',
    'testimonials.html': 'testimonials',
    'faq.html': 'faq',
  };

  const allFiles = Object.entries(SITE_KIT_FILES);
  // Filter out unselected page templates
  const files = selectedPages
    ? allFiles.filter(([path]) => {
        const pageId = optionalTemplates[path];
        return !pageId || selectedPages.includes(pageId);
      })
    : allFiles;

  let pushed = 0;
  for (const [path, content] of files) {
    await pushFileToRepo(token, repo, path, content, `Add ${path}`);
    pushed++;
    if (onProgress) onProgress(pushed, files.length, path);
  }

  return { pushed, total: files.length };
}

// ---- Vercel API helpers -------------------------------------

async function vercelApi(path, token, options = {}) {
  const r = await fetch(`https://api.vercel.com${path}`, {
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      ...options.headers
    },
    ...options
  });
  if (!r.ok) {
    const text = await r.text();
    throw new Error(`Vercel API ${r.status}: ${text}`);
  }
  return r.json();
}

async function validateVercelToken(token) {
  try {
    const user = await vercelApi('/v2/user', token);
    return { valid: true, username: user.user.username, name: user.user.name };
  } catch (e) {
    return { valid: false, error: e.message };
  }
}

async function createVercelProject(vercelToken, projectName, githubRepo) {
  const data = await vercelApi('/v10/projects', vercelToken, {
    method: 'POST',
    body: JSON.stringify({
      name: projectName,
      framework: null,
      gitRepository: {
        type: 'github',
        repo: githubRepo
      }
    })
  });
  return { projectId: data.id, name: data.name };
}

async function setVercelEnvVars(vercelToken, projectId, envVars) {
  // envVars: array of { key, value, target: ['production', 'preview'] }
  for (const env of envVars) {
    await vercelApi(`/v10/projects/${projectId}/env`, vercelToken, {
      method: 'POST',
      body: JSON.stringify({
        key: env.key,
        value: env.value,
        type: 'encrypted',
        target: env.target || ['production', 'preview']
      })
    });
  }
  return { set: envVars.length };
}

async function triggerVercelDeploy(vercelToken, projectName, githubRepo) {
  // Trigger a deployment via the Vercel API when auto-deploy doesn't fire
  // (e.g. when the GitHub App doesn't have access to a newly created repo)
  const data = await vercelApi('/v13/deployments', vercelToken, {
    method: 'POST',
    body: JSON.stringify({
      name: projectName,
      project: projectName,
      gitSource: {
        type: 'github',
        repo: githubRepo.split('/')[1],
        org: githubRepo.split('/')[0],
        ref: 'main'
      },
      target: 'production'
    })
  });
  return { deploymentId: data.id, url: data.url, readyState: data.readyState };
}

// ---- AI Image Generation (via EON proxy) --------------------

async function generateImage(prompt, aspectRatio) {
  const MAX_RETRIES = 3;
  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    const body = { prompt };
    if (aspectRatio) body.aspectRatio = aspectRatio;
    const r = await fetch('https://www.eonriskservices.com/api/ai-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.status === 429 && attempt < MAX_RETRIES) {
      const data = await r.json().catch(() => ({}));
      const delay = (data.retryDelay || 60) * 1000;
      await new Promise(resolve => setTimeout(resolve, delay));
      continue;
    }
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      throw new Error(data.error || `Image generation failed: ${r.status}`);
    }
    const data = await r.json();
    return data.data; // base64 PNG
  }
}

// ---- AI Environment Setup (via EON proxy) -------------------

async function setupAIEnvVars(vercelToken, projectId) {
  const r = await fetch('https://www.eonriskservices.com/api/ai-env', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ vercelToken, projectId })
  });
  if (!r.ok) {
    const data = await r.json().catch(() => ({}));
    throw new Error(data.error || `AI env setup failed: ${r.status}`);
  }
  return r.json();
}

async function registerSite(githubRepo) {
  // Auto-register the site with the usage gate (creates a row in the sites table)
  try {
    await fetch('https://www.eonriskservices.com/api/usage-gate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ githubRepo, action: 'check' })
    });
  } catch {
    // Non-critical — site will be registered on first agent call anyway
  }
}

async function pushImageToRepo(token, repo, path, base64Data, message) {
  let sha = null;
  try {
    const existing = await githubApi(`/repos/${repo}/contents/${path}`, token);
    sha = existing.sha;
  } catch {}

  const body = {
    message,
    content: base64Data, // already base64-encoded
    branch: 'main'
  };
  if (sha) body.sha = sha;

  return githubApi(`/repos/${repo}/contents/${path}`, token, {
    method: 'PUT',
    body: JSON.stringify(body)
  });
}

// ---- Trigger Initial Build (stepped) ------------------------
// Breaks the build into multiple small requests, each under 60s,
// so it works on Vercel's hobby plan (60s function timeout).

function buildBusinessBlock(info) {
  const parts = [];
  if (info.name)        parts.push(`Business name: ${info.name}`);
  if (info.description) parts.push(`Description: ${info.description}`);
  if (info.type)        parts.push(`Type: ${info.type}`);
  if (info.email)       parts.push(`Email: ${info.email}`);
  if (info.phone)       parts.push(`Phone: ${info.phone}`);
  if (info.address)     parts.push(`Address: ${info.address}`);
  if (info.hours)       parts.push(`Hours: ${info.hours}`);
  if (info.services)    parts.push(`Services: ${Array.isArray(info.services) ? info.services.join(', ') : info.services}`);
  if (info.tagline)     parts.push(`Tagline: ${info.tagline}`);
  if (info.tone)        parts.push(`Brand tone: ${info.tone}`);
  if (info.logo_url)    parts.push(`Logo image: ${info.logo_url}`);
  if (info.hero_url)    parts.push(`Hero/banner image: ${info.hero_url}`);
  return parts.join('\n');
}

async function agentCall(siteUrl, adminToken, message, businessInfo, onRetry) {
  const MAX_RETRIES = 3;
  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    const r = await fetch(`${siteUrl}/api/agent`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${adminToken}`
      },
      body: JSON.stringify({ mode: 'modify', message, businessInfo })
    });
    if (r.status === 429 && attempt < MAX_RETRIES) {
      const data = await r.json().catch(() => ({}));
      const delay = (data.retryDelay || 60) * 1000;
      if (onRetry) onRetry(attempt + 1, Math.round(delay / 1000));
      await new Promise(resolve => setTimeout(resolve, delay));
      continue;
    }
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      const errMsg = data.error || `Agent call failed: ${r.status}`;
      // Detect rate limit errors wrapped by the agent (Gemini 429 returned as 500)
      if (attempt < MAX_RETRIES && /429|rate.?limit|RESOURCE_EXHAUSTED|quota/i.test(errMsg)) {
        const delayMatch = errMsg.match(/retry\s*in\s*(\d+)/i);
        const delay = (delayMatch ? parseInt(delayMatch[1], 10) : 60) * 1000;
        if (onRetry) onRetry(attempt + 1, Math.round(delay / 1000));
        await new Promise(resolve => setTimeout(resolve, delay));
        continue;
      }
      throw new Error(errMsg);
    }
    return r.json();
  }
}

async function triggerSteppedBuild(siteUrl, adminToken, businessInfo, onStep, selectedPages) {
  const biz = buildBusinessBlock(businessInfo);
  const pageIds = selectedPages || ['home', 'contact', 'about'];
  const prompts = getPagePrompts(biz, pageIds);

  // Build the step list: always CSS first, then selected pages
  const steps = [prompts.css];
  for (const id of pageIds) {
    if (prompts[id]) steps.push(prompts[id]);
  }

  const results = [];
  for (let i = 0; i < steps.length; i++) {
    if (onStep) onStep(i, steps.length, steps[i].label);
    const onRetry = (attempt, delaySec) => {
      if (onStep) onStep(i, steps.length, `Rate limited — waiting ${delaySec}s (retry ${attempt}/3)...`);
    };
    const result = await agentCall(siteUrl, adminToken, steps[i].message, businessInfo, onRetry);
    results.push(result);
    // Brief pause between steps to let Vercel settle
    if (i < steps.length - 1) {
      await new Promise(resolve => setTimeout(resolve, 2000));
    }
  }
  if (onStep) onStep(steps.length, steps.length, 'Done');
  return results;
}

// ---- Generate Admin Token -----------------------------------

function generateAdminToken() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let token = '';
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  for (let i = 0; i < 32; i++) {
    token += chars[arr[i] % chars.length];
  }
  return token;
}

// ---- Full Setup Orchestrator --------------------------------

async function runFullSetup(config, onStep) {
  const {
    githubToken,
    vercelToken,
    aiApiKey,
    aiModel,
    businessInfo,
    repoName
  } = config;

  const report = (step, status, detail) => {
    if (onStep) onStep({ step, status, detail });
  };

  // Step 1: Create GitHub repo
  report('github_repo', 'running', 'Creating GitHub repository...');
  const { repo, url: repoUrl } = await createGitHubRepo(githubToken, repoName);
  report('github_repo', 'done', `Created ${repo}`);

  // Step 2: Push site kit files
  report('push_files', 'running', 'Pushing website files...');
  await pushSiteKit(githubToken, repo, (done, total, file) => {
    report('push_files', 'running', `Pushing ${file} (${done}/${total})`);
  });
  report('push_files', 'done', 'All files pushed');

  // Step 3: Create Vercel project linked to GitHub
  report('vercel_project', 'running', 'Creating Vercel project...');
  const projectSlug = repoName.toLowerCase().replace(/[^a-z0-9-]/g, '-');
  const { projectId } = await createVercelProject(vercelToken, projectSlug, repo);
  report('vercel_project', 'done', `Project "${projectSlug}" created`);

  // Step 4: Generate admin token and set env vars
  report('env_vars', 'running', 'Configuring environment...');
  const adminToken = generateAdminToken();
  await setVercelEnvVars(vercelToken, projectId, [
    { key: 'AI_API_KEY', value: aiApiKey },
    { key: 'AI_MODEL', value: aiModel },
    { key: 'GITHUB_TOKEN', value: githubToken },
    { key: 'GITHUB_REPO', value: repo },
    { key: 'ADMIN_TOKEN', value: adminToken },
    { key: 'CONTACT_EMAIL', value: businessInfo.email || '' },
  ]);
  report('env_vars', 'done', 'Environment configured');

  // Register site with usage tracking (non-blocking)
  registerSite(repo).catch(() => {});

  // Step 5: Wait for Vercel deployment
  report('deploy', 'running', 'Waiting for deployment...');
  const siteUrl = `https://${projectSlug}.vercel.app`;
  // Poll for deployment (Vercel auto-deploys on GitHub push)
  let deployed = false;
  for (let i = 0; i < 30; i++) {
    try {
      const r = await fetch(siteUrl, { method: 'HEAD' });
      if (r.ok || r.status === 404) { deployed = true; break; }
    } catch {}
    await new Promise(resolve => setTimeout(resolve, 5000));
  }
  if (!deployed) throw new Error('Deployment timed out');
  report('deploy', 'done', `Live at ${siteUrl}`);

  // Step 6: Trigger the AI to build the personalised site
  report('ai_build', 'running', 'AI is building your website...');
  const buildResult = await triggerInitialBuild(siteUrl, adminToken, businessInfo);
  report('ai_build', 'done', 'Website built!');

  return {
    siteUrl,
    adminUrl: `${siteUrl}/admin.html`,
    adminToken,
    repoUrl,
    buildResult
  };
}

  'js/main.js': `/* BuildMySite — Base JavaScript */

document.addEventListener('DOMContentLoaded', () => {
  // Nav scroll effect
  const nav = document.querySelector('.nav');
  if (nav) {
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    });
  }

  // Mobile nav toggle
  const toggle = document.querySelector('.nav__toggle');
  const links = document.querySelector('.nav__links');
  if (toggle && links) {
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.setAttribute('aria-expanded', open);
    });
    // Close on link click
    links.querySelectorAll('.nav__link').forEach(link => {
      link.addEventListener('click', () => {
        links.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      });
    });
  }

  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', (e) => {
      const target = document.querySelector(anchor.getAttribute('href'));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
});

        const data = Object.fromEntries(new FormData(form));
        const res = await fetch('/api/contact', {

          status.style.display = 'block';
          form.reset();

        status.className = 'form-status form-status--error';
        status.textContent = 'Something went wrong. Please try again or email us directly.';

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login__card {
      background: var(--white);
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .login__title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .login__subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .login__input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      margin-bottom: 16px;
      text-align: center;
      font-family: monospace;
      letter-spacing: 0.1em;
    }
    .login__input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(42,127,127,0.12); }
    .login__btn {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login__btn:hover { background: var(--teal-dark); }
    .login__error {
      color: #C62828;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    /* --- Main Layout --- */
    .main { flex: 1; display: none; flex-direction: column; max-height: calc(100vh - 56px); }
    .main.active { display: flex; }

    /* --- Build History --- */
    .history {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .history__empty {
      text-align: center;
      color: var(--text-muted);
      padding: 80px 24px;
    }
    .history__empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.3; }
    .history__empty-text { font-size: 0.95rem; }

    /* --- Build Entry --- */
    .build-entry {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .build-entry__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .build-entry__prompt {
      font-weight: 600;
      color: var(--navy);
      font-size: 0.95rem;
      flex: 1;
      margin-right: 12px;
    }
    .build-entry__time {
      color: var(--text-muted);
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .build-entry__response {
      color: var(--text-light);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .build-entry__files {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .build-entry__file {
      background: var(--bg);
      color: var(--text-light);
      font-size: 0.75rem;
      font-family: monospace;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
    }
    .build-entry__file--success { border-color: #A5D6A7; background: #E8F5E9; color: #2E7D32; }
    .build-entry__file--error { border-color: #EF9A9A; background: #FFEBEE; color: #C62828; }
    .build-entry__cost {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .build-entry__undo {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-light);
      padding: 4px 12px;
      border-radius: var(--radius);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .build-entry__undo:hover { border-color: #C62828; color: #C62828; }
    .build-entry__enhanced { margin-bottom: 12px; }
    .build-entry__enhanced summary {
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .build-entry__enhanced-text {
      font-family: monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--text-light);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .build-entry__footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* --- Status Badge --- */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 99px;
    }
    .status--building { background: #FFF3E0; color: #E65100; }
    .status--success { background: #E8F5E9; color: #2E7D32; }
    .status--error { background: #FFEBEE; color: #C62828; }
    .status__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .status--building .status__dot { animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* --- Input Area --- */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      background: var(--white);
    }
    .input-area__form {
      display: flex;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }
    .input-area__field {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      font-family: inherit;
    }
    .input-area__field:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(42,127,127,0.12); }
    .input-area__btn {
      padding: 12px 24px;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .input-area__btn:hover { background: var(--teal-dark); }
    .input-area__btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- Feature Templates Panel --- */
    .features {
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .features__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding-bottom: 12px;
      user-select: none;
    }
    .features__title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .features__chevron {
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .features--collapsed .features__chevron { transform: rotate(-90deg); }
    .features--collapsed .features__grid { display: none; }
    .features__grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding-bottom: 16px;
    }
    .feature-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .feature-card:hover { border-color: var(--teal); }
    .feature-card__icon { color: var(--teal); margin-bottom: 6px; }
    .feature-card__name {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--navy);
      margin-bottom: 2px;
    }
    .feature-card__desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .feature-card__btn {
      display: inline-block;
      padding: 5px 14px;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .feature-card__btn:hover { background: var(--teal-dark); }
    .feature-card__btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .feature-card__btn--done {
      background: #E8F5E9;
      color: #2E7D32;
      pointer-events: none;
    }

    /* --- Images Panel --- */
    .images {
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .images__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding-bottom: 12px;
      user-select: none;
    }
    .images__title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .images__chevron {
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .images--collapsed .images__chevron { transform: rotate(-90deg); }
    .images--collapsed .images__body { display: none; }
    .images__body {
      display: flex;
      gap: 16px;
      padding-bottom: 16px;
    }
    .upload-slot {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .upload-slot__label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--navy);
    }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--white);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .upload-zone:hover, .upload-zone--drag {
      border-color: var(--teal);
      background: rgba(42,127,127,0.04);
    }
    .upload-zone--uploading {
      pointer-events: none;
      opacity: 0.6;
    }
    .upload-zone__icon { color: var(--text-muted); margin-bottom: 8px; }
    .upload-zone__text {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .upload-zone__preview {
      width: 100%;
      max-height: 100px;
      object-fit: contain;
      border-radius: 4px;
    }
    .upload-zone__status {
      font-size: 0.72rem;
      color: var(--teal);
      margin-top: 6px;
      font-weight: 500;
    }
    .upload-zone__error {
      font-size: 0.72rem;
      color: #C62828;
      margin-top: 6px;
    }

    /* --- Usage Bar --- */
    .usage-bar {
      padding: 12px 24px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
    }
    .usage-bar__track {
      flex: 1;
      max-width: 200px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .usage-bar__fill {
      height: 100%;
      background: var(--teal);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .usage-bar__fill--warning { background: var(--gold); }
    .usage-bar__fill--full { background: #C62828; }
    .usage-bar__text { color: var(--text-light); }
    .usage-bar__text--pro { color: var(--teal); font-weight: 600; }
    .usage-bar__text--own-key { color: var(--text-muted); font-style: italic; }
    .usage-bar__upgrade {
      margin-left: auto;
      color: var(--teal);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.78rem;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .usage-bar__upgrade:hover { text-decoration: underline; }
    .usage-bar__settings {
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .usage-bar__settings:hover { color: var(--text); }

    /* --- Upgrade Modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 12px;
      padding: 32px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal__title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .modal__subtitle {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 24px;
    }
    .plan-cards { display: flex; gap: 12px; margin-bottom: 20px; }
    .plan-card {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .plan-card:hover { border-color: var(--teal); }
    .plan-card--popular { border-color: var(--teal); background: rgba(42,127,127,0.04); }
    .plan-card__name { font-weight: 700; font-size: 0.85rem; color: var(--navy); margin-bottom: 4px; }
    .plan-card__price { font-size: 1.3rem; font-weight: 700; color: var(--teal); }
    .plan-card__period { font-size: 0.75rem; color: var(--text-muted); }
    .plan-card__badge {
      display: inline-block;
      background: var(--gold);
      color: var(--white);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .modal__divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 16px 0;
      position: relative;
    }
    .modal__divider::before, .modal__divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .modal__divider::before { left: 0; }
    .modal__divider::after { right: 0; }
    .modal__own-key {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-light);
    }
    .modal__own-key a { color: var(--teal); cursor: pointer; }
    .modal__close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
    }

    /* --- Settings Panel --- */
    .settings {
      padding: 0 24px;
      overflow: hidden;
      transition: max-height 0.3s;
    }
    .settings--collapsed { max-height: 0 !important; padding: 0 24px; }
    .settings__body {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .settings__label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .settings__hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .settings__hint a { color: var(--teal); }
    .settings__row { display: flex; gap: 8px; align-items: center; }
    .settings__input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-family: monospace;
    }
    .settings__input:focus { outline: none; border-color: var(--teal); }
    .settings__save {
      padding: 8px 16px;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    .settings__save:hover { background: var(--teal-dark); }
    .settings__clear {
      padding: 8px 12px;
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.82rem;
      cursor: pointer;
    }
    .settings__status {
      font-size: 0.75rem;
      margin-top: 6px;
      color: var(--teal);
    }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      .history { padding: 16px; }
      .input-area { padding: 12px 16px; }
      .input-area__form { flex-direction: column; }
      .input-area__btn { width: 100%; }
      .build-entry { padding: 16px; }
      .build-entry__header { flex-direction: column; gap: 4px; }
      .login__card { padding: 28px 20px; }
      .features { padding: 12px 16px 0; }
      .features__grid { grid-template-columns: repeat(2, 1fr); }
      .images { padding: 12px 16px 0; }
      .images__body { flex-direction: column; }
      .usage-bar { padding: 10px 16px; flex-wrap: wrap; }
      .plan-cards { flex-direction: column; }
      .modal { padding: 24px 20px; }
      .settings__row { flex-direction: column; }
      .settings__save, .settings__clear { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login">
    <div class="login__card">
      <div class="login__title">BuildMySite Admin</div>
      <div class="login__subtitle">Enter your admin token to manage your website.</div>
      <input type="password" id="token-input" class="login__input" placeholder="Admin token" autocomplete="current-password">
      <button type="button" id="login-btn" class="login__btn">Sign In</button>
      <div id="login-error" class="login__error">Invalid token. Please try again.</div>
    </div>
  </div>

  <!-- Main Panel (hidden until authenticated) -->
  <header class="header" id="main-header" style="display:none">
    <div class="header__brand">
      BuildMySite <span class="header__badge">Admin</span>
    </div>
    <div class="header__actions">
      <a href="/" class="header__btn" target="_blank">View Site</a>
      <button type="button" class="header__btn" id="logout-btn">Sign Out</button>
    </div>
  </header>

  <!-- Usage Bar (shown after login) -->
  <div id="usage-bar" class="usage-bar" style="display:none">
    <div class="usage-bar__track"><div class="usage-bar__fill" id="usage-fill"></div></div>
    <span class="usage-bar__text" id="usage-text"></span>
    <button type="button" class="usage-bar__upgrade" id="usage-upgrade-btn" style="display:none">Upgrade to Pro</button>
    <button type="button" class="usage-bar__settings" id="settings-toggle-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>

  <!-- Settings Panel (collapsed by default) -->
  <div id="settings-panel" class="settings settings--collapsed">
    <div class="settings__body">
      <div class="settings__label">Your own Gemini API Key</div>
      <div class="settings__hint">Bypass free edit limits. Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>. Stored locally only — never sent to EON.</div>
      <div class="settings__row">
        <input type="password" class="settings__input" id="own-key-input" placeholder="AIza...">
        <button type="button" class="settings__save" id="own-key-save">Save</button>
        <button type="button" class="settings__clear" id="own-key-clear">Clear</button>
      </div>
      <div class="settings__status" id="own-key-status"></div>
    </div>
  </div>

  <!-- Upgrade Modal -->
  <div id="upgrade-modal" class="modal-overlay">
    <div class="modal" style="position:relative">
      <button type="button" class="modal__close" id="modal-close">&times;</button>
      <div class="modal__title">Upgrade to Pro</div>
      <div class="modal__subtitle">You've used all 5 free AI edits this month. Upgrade for unlimited edits.</div>
      <div class="plan-cards" id="plan-cards">
        <a class="plan-card" id="plan-monthly">
          <div class="plan-card__name">Monthly</div>
          <div class="plan-card__price">&euro;7</div>
          <div class="plan-card__period">/month</div>
        </a>
        <a class="plan-card plan-card--popular" id="plan-yearly">
          <div class="plan-card__badge">Save 42%</div>
          <div class="plan-card__name">Yearly</div>
          <div class="plan-card__price">&euro;49</div>
          <div class="plan-card__period">/year</div>
        </a>
        <a class="plan-card" id="plan-lifetime">
          <div class="plan-card__badge">Launch Special</div>
          <div class="plan-card__name">Lifetime</div>
          <div class="plan-card__price">&euro;29</div>
          <div class="plan-card__period">one-time</div>
        </a>
      </div>
      <div class="modal__divider">or</div>
      <div class="modal__own-key">Paste your own Gemini API key in <a id="modal-open-settings">Settings</a> for unlimited free edits.</div>
    </div>
  </div>

  <div id="main-panel" class="main">
    <div class="images" id="images-panel">
      <div class="images__header" id="images-toggle">
        <span class="images__title">Images</span>
        <svg class="images__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="images__body">
        <div class="upload-slot">
          <span class="upload-slot__label">Logo</span>
          <div class="upload-zone" id="upload-logo" data-type="logo">
            <input type="file" accept="image/*" style="display:none">
            <div class="upload-zone__icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </div>
            <div class="upload-zone__text">Drop logo here or click to browse</div>
          </div>
        </div>
        <div class="upload-slot">
          <span class="upload-slot__label">Hero Banner</span>
          <div class="upload-zone" id="upload-hero" data-type="hero">
            <input type="file" accept="image/*" style="display:none">
            <div class="upload-zone__icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 14l5-5 4 4 3-3 6 6"/><circle cx="15.5" cy="8.5" r="1.5"/></svg>
            </div>
            <div class="upload-zone__text">Drop hero image here or click to browse</div>
          </div>
        </div>
      </div>
    </div>
    <div class="features" id="features-panel">
      <div class="features__header" id="features-toggle">
        <span class="features__title">Add Pages</span>
        <svg class="features__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="features__grid" id="features-grid"></div>
    </div>
    <div class="history" id="history">
      <div class="history__empty" id="empty-state">
        <div class="history__empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
        </div>
        <div class="history__empty-text">No builds yet. Tell the AI what you'd like to change.</div>
      </div>
    </div>

    <div class="input-area">
      <form class="input-area__form" id="build-form">
        <textarea class="input-area__field" id="build-input" placeholder="What would you like to change?" rows="1"></textarea>
        <button type="submit" class="input-area__btn" id="build-btn">Build</button>
      </form>
    </div>
  </div>

  <script>
    // --- State ---
    let token = sessionStorage.getItem('admin_token') || '';
    let buildHistory = JSON.parse(localStorage.getItem('build_history') || '[]');
    let siteRepo = null;
    let ownApiKey = localStorage.getItem('own_gemini_key') || '';

    const USAGE_GATE_URL = 'https://www.eonriskservices.com/api/usage-gate';

    const loginScreen = document.getElementById('login-screen');
    const mainHeader = document.getElementById('main-header');
    const mainPanel = document.getElementById('main-panel');
    const tokenInput = document.getElementById('token-input');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');
    const logoutBtn = document.getElementById('logout-btn');
    const historyEl = document.getElementById('history');
    const emptyState = document.getElementById('empty-state');
    const buildForm = document.getElementById('build-form');
    const buildInput = document.getElementById('build-input');
    const buildBtn = document.getElementById('build-btn');

    // --- Usage Bar & Settings ---
    const usageBar = document.getElementById('usage-bar');
    const usageFill = document.getElementById('usage-fill');
    const usageText = document.getElementById('usage-text');
    const usageUpgradeBtn = document.getElementById('usage-upgrade-btn');
    const settingsToggleBtn = document.getElementById('settings-toggle-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const ownKeyInput = document.getElementById('own-key-input');
    const ownKeySave = document.getElementById('own-key-save');
    const ownKeyClear = document.getElementById('own-key-clear');
    const ownKeyStatus = document.getElementById('own-key-status');
    const upgradeModal = document.getElementById('upgrade-modal');
    const modalClose = document.getElementById('modal-close');
    const modalOpenSettings = document.getElementById('modal-open-settings');

    async function fetchSiteRepo() {
      try {
        const r = await fetch('/api/site-info');
        if (r.ok) {
          const data = await r.json();
          siteRepo = data.repo;
        }
      } catch {}
    }

    async function updateUsageBar() {
      if (ownApiKey) {
        usageBar.style.display = 'flex';
        usageFill.style.width = '0%';
        usageText.className = 'usage-bar__text usage-bar__text--own-key';
        usageText.textContent = 'Using your own API key';
        usageUpgradeBtn.style.display = 'none';
        return;
      }
      if (!siteRepo) return;
      try {
        const r = await fetch(USAGE_GATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ githubRepo: siteRepo, action: 'check' })
        });
        const data = await r.json();
        usageBar.style.display = 'flex';

        if (data.tier === 'pro' || data.tier === 'lifetime') {
          usageFill.style.width = '100%';
          usageFill.className = 'usage-bar__fill';
          usageText.className = 'usage-bar__text usage-bar__text--pro';
          usageText.textContent = data.tier === 'lifetime' ? 'Lifetime — unlimited edits' : 'Pro — unlimited edits';
          usageUpgradeBtn.style.display = 'none';
        } else {
          const pct = Math.round((data.used / data.limit) * 100);
          usageFill.style.width = pct + '%';
          usageFill.className = 'usage-bar__fill' +
            (pct >= 100 ? ' usage-bar__fill--full' : pct >= 80 ? ' usage-bar__fill--warning' : '');
          usageText.className = 'usage-bar__text';
          usageText.textContent = \`\${data.used}/\${data.limit} edits used this month\`;
          usageUpgradeBtn.style.display = data.remaining <= 2 ? '' : 'none';
        }
      } catch {
        // Silently fail — usage bar just won't show
      }
    }

    function showUpgradeModal() {
      if (!siteRepo) return;
      const base = 'https://www.eonriskservices.com/api/create-checkout';
      document.getElementById('plan-monthly').href = \`\${base}?repo=\${encodeURIComponent(siteRepo)}&plan=monthly\`;
      document.getElementById('plan-yearly').href = \`\${base}?repo=\${encodeURIComponent(siteRepo)}&plan=yearly\`;
      document.getElementById('plan-lifetime').href = \`\${base}?repo=\${encodeURIComponent(siteRepo)}&plan=lifetime\`;
      upgradeModal.classList.add('active');
    }

    usageUpgradeBtn.addEventListener('click', showUpgradeModal);
    modalClose.addEventListener('click', () => upgradeModal.classList.remove('active'));
    upgradeModal.addEventListener('click', (e) => {
      if (e.target === upgradeModal) upgradeModal.classList.remove('active');
    });
    modalOpenSettings.addEventListener('click', () => {
      upgradeModal.classList.remove('active');
      settingsPanel.classList.remove('settings--collapsed');
    });

    settingsToggleBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('settings--collapsed');
    });

    ownKeyInput.value = ownApiKey ? '••••••••' : '';
    ownKeySave.addEventListener('click', () => {
      const key = ownKeyInput.value.trim();
      if (!key || key === '••••••••') return;
      ownApiKey = key;
      localStorage.setItem('own_gemini_key', key);
      ownKeyInput.value = '••••••••';
      ownKeyStatus.textContent = 'Saved. Your edits now bypass the free limit.';
      updateUsageBar();
    });
    ownKeyClear.addEventListener('click', () => {
      ownApiKey = '';
      localStorage.removeItem('own_gemini_key');
      ownKeyInput.value = '';
      ownKeyStatus.textContent = 'Cleared. Using EON\\'s API key with free limits.';
      updateUsageBar();
    });

    // --- Auth ---
    function showMain() {
      loginScreen.style.display = 'none';
      mainHeader.style.display = 'flex';
      mainPanel.classList.add('active');
      renderHistory();
      buildInput.focus();
      // Load usage info
      fetchSiteRepo().then(() => updateUsageBar());
    }

    function showLogin() {
      loginScreen.style.display = 'flex';
      mainHeader.style.display = 'none';
      mainPanel.classList.remove('active');
      loginError.style.display = 'none';
    }

    async function verifyToken(t) {
      // Verify by making a lightweight agent call
      try {
        const r = await fetch('/api/agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': \`Bearer \${t}\` },
          body: JSON.stringify({ message: '' })
        });
        // 400 means token is valid but message is empty — that's fine
        // 401 means token is invalid
        return r.status !== 401;
      } catch {
        // Network error — assume token might be valid, let them try
        return true;
      }
    }

    loginBtn.addEventListener('click', async () => {
      const t = tokenInput.value.trim();
      if (!t) return;
      loginBtn.disabled = true;
      loginBtn.textContent = 'Verifying...';
      const valid = await verifyToken(t);
      if (valid) {
        token = t;
        sessionStorage.setItem('admin_token', token);
        showMain();
      } else {
        loginError.style.display = 'block';
      }
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    });

    tokenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    logoutBtn.addEventListener('click', () => {
      token = '';
      sessionStorage.removeItem('admin_token');
      tokenInput.value = '';
      showLogin();
    });

    // Auto-login if token exists
    if (token) {
      showMain();
    }

    // --- Build History Rendering ---
    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return \`\${Math.floor(diff / 60000)}m ago\`;
      if (diff < 86400000) return \`\${Math.floor(diff / 3600000)}h ago\`;
      return d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function renderHistory() {
      // Remove all build entries (keep empty state)
      historyEl.querySelectorAll('.build-entry').forEach(el => el.remove());

      if (buildHistory.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      // Render newest first
      for (let i = buildHistory.length - 1; i >= 0; i--) {
        const entry = buildHistory[i];
        const el = document.createElement('div');
        el.className = 'build-entry';
        el.dataset.index = i;

        const filesHtml = (entry.buildLog || []).map(f => {
          const cls = f.success ? 'build-entry__file--success' : 'build-entry__file--error';
          const label = f.tool === 'write_file' ? f.args.path : \`\${f.tool}: \${f.args.path || ''}\`;
          return \`<span class="build-entry__file \${cls}">\${label}</span>\`;
        }).join('');

        const costStr = entry.usage?.costUsd ? \`$\${entry.usage.costUsd.toFixed(4)}\` : '';
        const modelStr = entry.usage?.model || '';

        const enhancedHtml = entry.enhancedPrompt ? \`
          <details class="build-entry__enhanced">
            <summary>Enhanced prompt</summary>
            <pre class="build-entry__enhanced-text">\${escapeHtml(entry.enhancedPrompt)}</pre>
          </details>\` : '';

        el.innerHTML = \`
          <div class="build-entry__header">
            <div class="build-entry__prompt">\${escapeHtml(entry.prompt)}</div>
            <div class="build-entry__time">\${formatTime(entry.timestamp)}</div>
          </div>
          \${enhancedHtml}
          \${entry.response ? \`<div class="build-entry__response">\${escapeHtml(entry.response)}</div>\` : ''}
          \${filesHtml ? \`<div class="build-entry__files">\${filesHtml}</div>\` : ''}
          <div class="build-entry__footer">
            <span class="build-entry__cost">\${[modelStr, costStr].filter(Boolean).join(' — ')}</span>
            \${entry.buildLog?.length ? \`<button type="button" class="build-entry__undo" data-index="\${i}">Undo</button>\` : ''}
          </div>
        \`;

        historyEl.appendChild(el);
      }

      // Scroll to top (newest)
      historyEl.scrollTop = 0;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // --- Prompt Enhancement ---
    async function enhancePrompt(message) {
      try {
        const r = await fetch('/api/enhance-prompt', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': \`Bearer \${token}\`
          },
          body: JSON.stringify({ message })
        });
        if (!r.ok) return null;
        return await r.json();
      } catch {
        return null;
      }
    }

    // --- Build Submission ---
    buildForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = buildInput.value.trim();
      if (!message) return;

      buildBtn.disabled = true;
      buildBtn.textContent = 'Enhancing...';
      buildInput.disabled = true;

      // Add a "building" entry
      const tempEntry = {
        prompt: message,
        timestamp: Date.now(),
        status: 'building'
      };
      buildHistory.push(tempEntry);
      renderHistory();

      try {
        // Step 1: Enhance the prompt
        let agentMessage = message;
        let enhanceCost = 0;
        const enhanced = await enhancePrompt(message);
        if (enhanced && enhanced.enhancedPrompt) {
          agentMessage = enhanced.enhancedPrompt;
          enhanceCost = enhanced.costUsd || 0;
          tempEntry.enhancedPrompt = enhanced.enhancedPrompt;
        }

        // Step 2: Send to agent
        buildBtn.textContent = 'Building...';
        const agentHeaders = {
          'Content-Type': 'application/json',
          'Authorization': \`Bearer \${token}\`
        };
        if (ownApiKey) agentHeaders['X-User-Api-Key'] = ownApiKey;

        const r = await fetch('/api/agent', {
          method: 'POST',
          headers: agentHeaders,
          body: JSON.stringify({ message: agentMessage })
        });

        if (r.status === 401) {
          token = '';
          sessionStorage.removeItem('admin_token');
          showLogin();
          buildHistory.pop();
          return;
        }

        if (r.status === 402) {
          buildHistory.pop();
          showUpgradeModal();
          buildBtn.disabled = false;
          buildBtn.textContent = 'Build';
          buildInput.disabled = false;
          return;
        }

        const data = await r.json();

        if (!r.ok) {
          tempEntry.status = 'error';
          tempEntry.response = data.error || 'Something went wrong.';
        } else {
          tempEntry.status = 'success';
          tempEntry.response = data.text || '';
          tempEntry.buildLog = data.buildLog || [];
          tempEntry.usage = data.usage || {};
          tempEntry.commitSha = data.commit?.sha || null;
          // Sum enhance + agent costs
          if (enhanceCost && tempEntry.usage.costUsd) {
            tempEntry.usage.enhanceCostUsd = enhanceCost;
            tempEntry.usage.costUsd = Math.round((tempEntry.usage.costUsd + enhanceCost) * 10000) / 10000;
          }
        }
      } catch (err) {
        tempEntry.status = 'error';
        tempEntry.response = \`Network error: \${err.message}\`;
      }

      localStorage.setItem('build_history', JSON.stringify(buildHistory));
      renderHistory();

      buildInput.value = '';
      buildBtn.disabled = false;
      buildBtn.textContent = 'Build';
      buildInput.disabled = false;
      buildInput.focus();
      updateUsageBar();
    });

    // --- Undo (deterministic git revert via /api/revert) ---
    historyEl.addEventListener('click', async (e) => {
      const undoBtn = e.target.closest('.build-entry__undo');
      if (!undoBtn) return;

      const idx = parseInt(undoBtn.dataset.index);
      const entry = buildHistory[idx];
      if (!entry?.buildLog) return;

      if (!entry.commitSha) {
        alert('Cannot undo: no commit SHA recorded for this build. Only builds from this session onwards support deterministic revert.');
        return;
      }

      if (!confirm('Undo this change? This will restore each file to its exact state before this commit.')) return;

      undoBtn.disabled = true;
      undoBtn.textContent = 'Reverting...';

      let revertedCount = 0;
      let failedFiles = [];

      for (const log of entry.buildLog) {
        if (!log.success || log.tool !== 'write_file' || !log.args.path) continue;

        try {
          const r = await fetch('/api/revert', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': \`Bearer \${token}\`
            },
            body: JSON.stringify({
              filePath: log.args.path,
              commitSha: entry.commitSha
            })
          });

          if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            throw new Error(data.error || \`HTTP \${r.status}\`);
          }
          revertedCount++;
        } catch (err) {
          console.error('Revert failed for', log.args.path, err);
          failedFiles.push(log.args.path);
        }
      }

      if (failedFiles.length > 0) {
        alert(\`Reverted \${revertedCount} file(s) but failed on: \${failedFiles.join(', ')}\`);
      }

      entry.undone = true;
      localStorage.setItem('build_history', JSON.stringify(buildHistory));
      renderHistory();
    });

    // --- Feature Templates (Add Pages) ---
    const PAGE_TEMPLATES = {
      gallery: {
        name: 'Gallery',
        file: 'gallery.html',
        desc: 'Image grid with captions',
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
        prompt: \`Add a Gallery page to my site.

Follow these exact steps:
1. Read index.html to learn the business name, branding, and current nav links.
2. Read gallery.html — it is a pre-built template with the correct CSS grid structure. Do NOT write a gallery page from scratch.
3. Rewrite gallery.html with content customised for this business:
   - Match the nav and footer exactly to index.html (same business name, same links, plus a new Gallery link)
   - Update the hero section title and description for this business
   - Write real, specific gallery item captions relevant to this business
   - Keep every CSS class exactly as-is: gallery-grid, gallery-item, gallery-item__placeholder, gallery-item__caption, nav, hero--compact, footer
   - Keep all SVG placeholder icons exactly as-is
   - You may add or remove gallery-item blocks
4. Use list_files to find all other .html pages. Read each one, add a "Gallery" nav link pointing to gallery.html, and write the updated file.
5. Write all updated files.\`
      },
      menu: {
        name: 'Menu',
        file: 'menu.html',
        desc: 'Categorised items with prices',
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="8" cy="6" r="1" fill="currentColor"/><circle cx="8" cy="12" r="1" fill="currentColor"/><circle cx="8" cy="18" r="1" fill="currentColor"/></svg>',
        prompt: \`Add a Menu / Pricing page to my site.

Follow these exact steps:
1. Read index.html to learn the business name, branding, and current nav links.
2. Read menu.html — it is a pre-built template with the correct menu layout. Do NOT write a menu page from scratch.
3. Rewrite menu.html with content customised for this business:
   - Match the nav and footer exactly to index.html (same business name, same links, plus a new Menu link)
   - Update the hero section title and description
   - Create menu categories and items relevant to this business with realistic EUR prices
   - Keep every CSS class exactly as-is: menu-category, menu-category__title, menu-item, menu-item__header, menu-item__name, menu-item__price, menu-item__desc, nav, hero--compact, footer, container-narrow
   - You may add or remove menu-category and menu-item blocks
4. Use list_files to find all other .html pages. Read each one, add a "Menu" nav link pointing to menu.html, and write the updated file.
5. Write all updated files.\`
      },
      testimonials: {
        name: 'Testimonials',
        file: 'testimonials.html',
        desc: 'Customer quote cards',
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 5v3c0 1 0 1 1 1z"/></svg>',
        prompt: \`Add a Testimonials page to my site.

Follow these exact steps:
1. Read index.html to learn the business name, branding, and current nav links.
2. Read testimonials.html — it is a pre-built template with the correct card layout. Do NOT write a testimonials page from scratch.
3. Rewrite testimonials.html with content customised for this business:
   - Match the nav and footer exactly to index.html (same business name, same links, plus a new Testimonials link)
   - Update the hero section title and description
   - Write realistic, believable testimonials with Irish names relevant to this business type
   - Keep every CSS class exactly as-is: testimonial-card, testimonial-card__quote, testimonial-card__author, testimonial-card__role, grid, grid-2, nav, hero--compact, footer
   - You may add or remove testimonial-card blocks (keep them in a grid-2 layout)
4. Use list_files to find all other .html pages. Read each one, add a "Testimonials" nav link pointing to testimonials.html, and write the updated file.
5. Write all updated files.\`
      },
      faq: {
        name: 'FAQ',
        file: 'faq.html',
        desc: 'Accordion Q&A section',
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r="0.5" fill="currentColor"/></svg>',
        prompt: \`Add a FAQ page to my site.

Follow these exact steps:
1. Read index.html to learn the business name, branding, and current nav links.
2. Read faq.html — it is a pre-built template with the correct accordion structure using details/summary elements. Do NOT write a FAQ page from scratch.
3. Rewrite faq.html with content customised for this business:
   - Match the nav and footer exactly to index.html (same business name, same links, plus a new FAQ link)
   - Update the hero section title and description
   - Write 6-10 relevant FAQs for this specific type of business
   - Keep the details/summary structure exactly as-is
   - Keep the first details element open (has the "open" attribute)
   - Keep every CSS class exactly as-is: faq-item, faq-item__question, faq-item__answer, container-narrow, nav, hero--compact, footer
   - You may add or remove faq-item blocks
4. Use list_files to find all other .html pages. Read each one, add a "FAQ" nav link pointing to faq.html, and write the updated file.
5. Write all updated files.\`
      }
    };

    // Render feature cards
    const featuresGrid = document.getElementById('features-grid');
    const featuresPanel = document.getElementById('features-panel');
    const featuresToggle = document.getElementById('features-toggle');

    function renderFeatureCards() {
      featuresGrid.innerHTML = '';
      for (const [key, tpl] of Object.entries(PAGE_TEMPLATES)) {
        const card = document.createElement('div');
        card.className = 'feature-card';
        card.innerHTML = \`
          <div class="feature-card__icon">\${tpl.icon}</div>
          <div class="feature-card__name">\${tpl.name}</div>
          <div class="feature-card__desc">\${tpl.desc}</div>
          <button type="button" class="feature-card__btn" data-page="\${key}">Add to site</button>
        \`;
        featuresGrid.appendChild(card);
      }
    }

    // Toggle collapse
    if (localStorage.getItem('features_collapsed') === 'true') {
      featuresPanel.classList.add('features--collapsed');
    }
    featuresToggle.addEventListener('click', () => {
      featuresPanel.classList.toggle('features--collapsed');
      localStorage.setItem('features_collapsed', featuresPanel.classList.contains('features--collapsed'));
    });

    // Handle "Add to site" clicks
    featuresGrid.addEventListener('click', async (e) => {
      const btn = e.target.closest('.feature-card__btn');
