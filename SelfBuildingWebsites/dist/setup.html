// ---- GitHub API helpers -------------------------------------
function makeGitHub(env) {
  const { GITHUB_TOKEN, GITHUB_REPO, GITHUB_BRANCH } = env;
  const branch = GITHUB_BRANCH || 'main';
  const headers = {
    'Authorization': \`Bearer \${GITHUB_TOKEN}\`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };

  return {
    async get(path) {
      const r = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${path}?ref=\${branch}\`,
        { headers }
      );
      if (!r.ok) throw new Error(\`GitHub GET \${path}: \${r.status}\`);
      return r.json();
    },

    async put(path, content, message, sha) {
      const body = { message, content: Buffer.from(content).toString('base64'), branch };
      if (sha) body.sha = sha;
      const r = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${path}\`,
        { method: 'PUT', headers, body: JSON.stringify(body) }
      );
      if (!r.ok) {
        const t = await r.text();
        throw new Error(\`GitHub PUT \${path}: \${r.status} \${t}\`);
      }
      return r.json();
    },

    async del(path, message, sha) {
      const r = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${path}\`,
        { method: 'DELETE', headers, body: JSON.stringify({ message, sha, branch }) }
      );
      if (!r.ok) throw new Error(\`GitHub DELETE \${path}: \${r.status}\`);
      return { deleted: path };
    },

    async listTree() {
      const r = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/git/trees/\${branch}?recursive=1\`,
        { headers }
      );
      const data = await r.json();
      return (data.tree || []).filter(f => f.type === 'blob').map(f => f.path);
    },

    // Batch commit multiple files in a single commit using Git Trees API
    async batchCommit(files, message) {
      // files: [{ path, content }]
      // 1. Get the current commit SHA for the branch
      const refR = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/git/ref/heads/\${branch}\`,
        { headers }
      );
      if (!refR.ok) throw new Error(\`Failed to get branch ref: \${refR.status}\`);
      const refData = await refR.json();
      const baseSha = refData.object.sha;

      // 2. Get the tree SHA from the base commit
      const commitR = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/git/commits/\${baseSha}\`,
        { headers }
      );
      if (!commitR.ok) throw new Error(\`Failed to get base commit: \${commitR.status}\`);
      const commitData = await commitR.json();
      const baseTreeSha = commitData.tree.sha;

      // 3. Create blobs for each file
      const treeEntries = [];
      for (const file of files) {
        const blobR = await fetch(
          \`https://api.github.com/repos/\${GITHUB_REPO}/git/blobs\`,
          {
            method: 'POST', headers,
            body: JSON.stringify({ content: file.content, encoding: 'utf-8' })
          }
        );
        if (!blobR.ok) throw new Error(\`Failed to create blob for \${file.path}: \${blobR.status}\`);
        const blobData = await blobR.json();
        treeEntries.push({ path: file.path, mode: '100644', type: 'blob', sha: blobData.sha });
      }

      // 4. Create a new tree
      const treeR = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/git/trees\`,
        {
          method: 'POST', headers,
          body: JSON.stringify({ base_tree: baseTreeSha, tree: treeEntries })
        }
      );
      if (!treeR.ok) throw new Error(\`Failed to create tree: \${treeR.status}\`);
      const treeData = await treeR.json();

      // 5. Create a new commit
      const newCommitR = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/git/commits\`,
        {
          method: 'POST', headers,
          body: JSON.stringify({ message, tree: treeData.sha, parents: [baseSha] })
        }
      );
      if (!newCommitR.ok) throw new Error(\`Failed to create commit: \${newCommitR.status}\`);
      const newCommitData = await newCommitR.json();

      // 6. Update the branch ref
      const updateR = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/git/refs/heads/\${branch}\`,
        {
          method: 'PATCH', headers,
          body: JSON.stringify({ sha: newCommitData.sha })
        }
      );
      if (!updateR.ok) throw new Error(\`Failed to update branch ref: \${updateR.status}\`);

      return { sha: newCommitData.sha, filesCommitted: files.length };
    }
  };
}

// ---- Security helpers ---------------------------------------

const PROTECTED_PATHS = ['api/agent.js', 'api/contact.js', 'api/revert.js', 'api/site-info.js', 'admin.html', 'vercel.json', 'package.json', '.env'];
const MAX_FILE_SIZE = 500_000; // 500KB per file

// ---- Structural validation ----------------------------------
// Required CSS classes per page file. If the AI's output is missing any of these,
// the write is blocked before it reaches pendingWrites.
// These are the same classes listed in the page prompt constraints (setup.js).
const REQUIRED_CLASSES = {
  'index.html': ['nav', 'nav__inner', 'nav__brand', 'nav__links', 'nav__link', 'hero', 'container', 'footer', 'footer__brand', 'footer__bottom', 'footer__badge'],
  'contact.html': ['nav', 'nav__inner', 'nav__brand', 'contact-grid', 'contact-form', 'form-group', 'contact-info', 'footer'],
  'about.html': ['nav', 'nav__inner', 'nav__brand', 'section', 'container', 'footer'],
  'services.html': ['nav', 'nav__inner', 'nav__brand', 'hero--compact', 'grid', 'card', 'card__title', 'footer'],
  'gallery.html': ['nav', 'gallery-grid', 'gallery-item', 'gallery-item__caption', 'hero--compact', 'footer'],
  'menu.html': ['nav', 'menu-category', 'menu-item', 'menu-item__name', 'menu-item__price', 'hero--compact', 'footer'],
  'testimonials.html': ['nav', 'testimonial-card', 'testimonial-card__quote', 'testimonial-card__author', 'hero--compact', 'footer'],
  'faq.html': ['nav', 'faq-item', 'faq-item__question', 'faq-item__answer', 'hero--compact', 'footer'],
};

function validateStructure(filePath, content) {
  const requiredClasses = REQUIRED_CLASSES[filePath];
  if (!requiredClasses) return null; // No validation rules for this file

  const missing = [];
  for (const cls of requiredClasses) {
    // Check for the class name as a class attribute value or substring
    // Handles: class="nav", class="nav foo", class="foo nav bar"
    if (!content.includes(cls)) {
      missing.push(cls);
    }
  }

  if (missing.length > 0) {
    return \`Build blocked: AI removed required structural classes from \${filePath}: \${missing.join(', ')}. The file was NOT committed.\`;
  }
  return null;
}

function validatePath(path) {
  if (!path || typeof path !== 'string') throw new Error('Path is required');
  if (path.includes('..') || path.startsWith('/') || path.startsWith('\\\\')) {
    throw new Error(\`Invalid path: \${path}\`);
  }
  if (PROTECTED_PATHS.includes(path.toLowerCase())) {
    throw new Error(\`Protected file: \${path} cannot be modified by the agent\`);
  }
}

// ---- Rate limiting ------------------------------------------

const agentRequests = new Map();
const AGENT_RATE_LIMIT = 10;      // max requests
const AGENT_RATE_WINDOW = 300_000; // per 5 minutes

function isAgentRateLimited(ip) {
  const now = Date.now();
  const record = agentRequests.get(ip);
  if (!record || now - record.firstAt > AGENT_RATE_WINDOW) {
    agentRequests.set(ip, { count: 1, firstAt: now });
    return false;
  }
  record.count++;
  return record.count > AGENT_RATE_LIMIT;
}

// ---- Tool execution -----------------------------------------
// pendingWrites collects files during the agent loop; they are batch-committed at the end
async function executeTool(name, args, env, pendingWrites) {
  const gh = makeGitHub(env);

  switch (name) {
    case 'read_file': {
      validatePath(args.path);
      // Check pending writes first (agent may read a file it just wrote)
      const pending = pendingWrites.find(f => f.path === args.path);
      if (pending) {
        return { path: args.path, content: pending.content, size: pending.content.length, source: 'pending' };
      }
      const file = await gh.get(args.path);
      const content = Buffer.from(file.content, 'base64').toString('utf-8');
      return { path: args.path, content, size: content.length };
    }

    case 'write_file': {
      validatePath(args.path);
      let content = args.content || '';

      // Content size limit
      if (content.length > MAX_FILE_SIZE) {
        throw new Error(\`File too large: \${content.length} chars (max \${MAX_FILE_SIZE})\`);
      }

      // Fix double-escaped newlines (some models mangle these)
      const realNL = (content.match(/\\n/g) || []).length;
      const escapedNL = (content.match(/\\\\n/g) || []).length;
      if (escapedNL > 10 && realNL === 0) {
        content = content.replace(/\\\\n/g, '\\n').replace(/\\\\t/g, '\\t').replace(/\\\\'/g, "'");
      }

      // Pre-commit validation: hard gate
      if (!content.trim()) {
        throw new Error(\`Write blocked: content for \${args.path} is empty.\`);
      }
      if (args.path.endsWith('.html') && !content.includes('<html') && !content.toLowerCase().includes('<!doctype')) {
        throw new Error(\`Write blocked: \${args.path} is missing <!DOCTYPE html> or <html> root element.\`);
      }

      // Structural validation: verify required CSS classes are preserved
      const structureError = validateStructure(args.path, content);
      if (structureError) {
        throw new Error(structureError);
      }

      // Stage the file for batch commit (replaces any previous pending write to same path)
      const existingIdx = pendingWrites.findIndex(f => f.path === args.path);
      if (existingIdx >= 0) {
        pendingWrites[existingIdx] = { path: args.path, content };
      } else {
        pendingWrites.push({ path: args.path, content });
      }

      return { staged: args.path, message: args.commit_message, chars: content.length };
    }

    case 'delete_file': {
      validatePath(args.path);
      const file = await gh.get(args.path);
      await gh.del(args.path, args.commit_message, file.sha);
      return { deleted: args.path, _pre_sha: file.sha };
    }

    case 'list_files': {
      const allFiles = await gh.listTree();
      const path = args.path || '';
      const files = path ? allFiles.filter(f => f.startsWith(path)) : allFiles;
      // Include any pending writes not yet on disk
      const pendingPaths = pendingWrites.map(f => f.path).filter(p => !files.includes(p));
      const combined = [...files, ...pendingPaths];
      return { files: combined, count: combined.length };
    }

    default:
      throw new Error(\`Unknown tool: \${name}\`);
  }
}

// ---- Provider adapters --------------------------------------

async function callAnthropic(messages, systemPrompt, model, apiKey) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      model,
      max_tokens: APPROVED_MODELS[model]?.maxTokens || 8096,
      system: systemPrompt,
      messages,
      tools: TOOLS.map(t => ({
        name: t.name,
        description: t.description,
        input_schema: t.parameters
      }))
    })
  });
  if (!r.ok) { const t = await r.text(); throw new Error(\`Anthropic \${r.status}: \${t}\`); }
  const data = await r.json();

  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  const toolCalls = data.content.filter(b => b.type === 'tool_use').map(b => ({
    id: b.id, name: b.name, args: b.input
  }));
  return {
    text,
    toolCalls,
    usage: { prompt: data.usage.input_tokens, completion: data.usage.output_tokens },
    stopReason: data.stop_reason
  };
}

async function callOpenAICompatible(messages, systemPrompt, model, apiKey, baseUrl, maxTokens) {
  const url = baseUrl + '/v1/chat/completions';
  const oaiMessages = [
    { role: 'system', content: systemPrompt },
    ...messages.map(m => {
      if (m.role === 'tool') return { role: 'tool', tool_call_id: m.tool_call_id, content: JSON.stringify(m.content) };
      return { role: m.role, content: m.content, tool_calls: m.tool_calls };
    })
  ];

  let r = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': \`Bearer \${apiKey}\`
    },
    body: JSON.stringify({
      model,
      messages: oaiMessages,
      tools: TOOLS.map(t => ({
        type: 'function',
        function: { name: t.name, description: t.description, parameters: t.parameters }
      })),
      tool_choice: 'auto',
      max_tokens: maxTokens
    })
  });
  if (r.status === 429) {
    // Parse retry delay from Gemini/OpenAI 429 response
    const errBody = await r.text();
    const delayMatch = errBody.match(/"retryDelay"\\s*:\\s*"(\\d+)s?"/);
    const delaySec = delayMatch ? parseInt(delayMatch[1], 10) : 60;
    const waitMs = Math.min(delaySec, 120) * 1000;
    await new Promise(resolve => setTimeout(resolve, waitMs));
    // Retry once
    const r2 = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': \`Bearer \${apiKey}\`
      },
      body: JSON.stringify({
        model,
        messages: oaiMessages,
        tools: TOOLS.map(t => ({
          type: 'function',
          function: { name: t.name, description: t.description, parameters: t.parameters }
        })),
        tool_choice: 'auto',
        max_tokens: maxTokens
      })
    });
    if (!r2.ok) { const t = await r2.text(); throw new Error(\`\${model} \${r2.status}: \${t}\`); }
    r = r2;
  } else if (!r.ok) {
    const t = await r.text(); throw new Error(\`\${model} \${r.status}: \${t}\`);
  }
  const data = await r.json();
  const choice = data.choices[0];
  const msg = choice.message;

  if (choice.finish_reason === 'length') {
    throw new Error('Model hit output token limit mid-response. Try a simpler request.');
  }

  const text = msg.content || '';
  const toolCalls = (msg.tool_calls || []).map(tc => {
    let args;
    try {
      args = JSON.parse(tc.function.arguments || '{}');
    } catch (e) {
      throw new Error(\`Tool call "\${tc.function.name}" returned unparseable arguments: \${e.message}\`);
    }
    return { id: tc.id, name: tc.function.name, args };
  });

  return {
    text,
    toolCalls,
    rawToolCalls: msg.tool_calls || [],
    usage: { prompt: data.usage?.prompt_tokens || 0, completion: data.usage?.completion_tokens || 0 },
    stopReason: choice.finish_reason
  };
}

// ---- Message format converters ------------------------------

function anthropicMessages(history) {
  // Anthropic format: { role: 'user'|'assistant', content: string|array }
  return history.map(m => {
    if (m.role === 'tool_result') {
      return {
        role: 'user',
        content: [{
          type: 'tool_result',
          tool_use_id: m.tool_use_id,
          content: JSON.stringify(m.content)
        }]
      };
    }
    if (m.role === 'assistant' && m.tool_calls) {
      const content = [];
      if (m.text) content.push({ type: 'text', text: m.text });
      for (const tc of m.tool_calls) {
        content.push({ type: 'tool_use', id: tc.id, name: tc.name, input: tc.args });
      }
      return { role: 'assistant', content };
    }
    return { role: m.role, content: m.content || m.text || '' };
  });
}

function openaiMessages(history) {
  return history.map(m => {
    if (m.role === 'tool_result') {
      return { role: 'tool', tool_call_id: m.tool_use_id, content: JSON.stringify(m.content) };
    }
    if (m.role === 'assistant' && m.tool_calls) {
      return {
        role: 'assistant',
        content: m.text || '',
        tool_calls: m.tool_calls.map(tc => ({
          id: tc.id,
          type: 'function',
          function: { name: tc.name, arguments: JSON.stringify(tc.args) }
        }))
      };
    }
    return { role: m.role, content: m.content || m.text || '' };
  });
}

async function runAgent(userMessage, env, businessInfo, mode) {
  const model = env.AI_MODEL;
  const apiKey = env.AI_API_KEY;
  const modelConfig = APPROVED_MODELS[model];

  if (!modelConfig) {
    throw new Error(\`Model "\${model}" is not approved. Approved models: \${Object.keys(APPROVED_MODELS).join(', ')}\`);
  }
  if (!apiKey) {
    throw new Error('No AI API key configured');
  }

  const systemPrompt = buildSystemPrompt(businessInfo, mode || 'modify');
  const provider = modelConfig.provider;

  // Internal message history (provider-agnostic)
  const history = [{ role: 'user', content: userMessage }];

  let totalPromptTokens = 0;
  let totalCompletionTokens = 0;
  let finalText = '';
  const buildLog = [];
  const pendingWrites = []; // Collected during loop, batch-committed at end

  for (let turn = 0; turn < 25; turn++) {
    let response;

    if (provider === 'anthropic') {
      const msgs = anthropicMessages(history);
      response = await callAnthropic(msgs, systemPrompt, model, apiKey);
    } else if (provider === 'openai') {
      const msgs = openaiMessages(history);
      response = await callOpenAICompatible(msgs, systemPrompt, model, apiKey, 'https://api.openai.com', modelConfig.maxTokens);
    } else if (provider === 'google') {
      const msgs = openaiMessages(history);
      response = await callOpenAICompatible(msgs, systemPrompt, model, apiKey, 'https://generativelanguage.googleapis.com/v1beta/openai', modelConfig.maxTokens);
    }

    totalPromptTokens += response.usage.prompt;
    totalCompletionTokens += response.usage.completion;

    if (response.text) {
      finalText += response.text;
    }

    // No tool calls — agent is done
    if (!response.toolCalls || response.toolCalls.length === 0) {
      break;
    }

    // Record assistant message with tool calls
    history.push({
      role: 'assistant',
      text: response.text,
      tool_calls: response.toolCalls
    });

    // Execute each tool call
    for (const tc of response.toolCalls) {
      let result;
      try {
        result = await executeTool(tc.name, tc.args, env, pendingWrites);
        buildLog.push({ tool: tc.name, args: tc.args, success: true });
      } catch (err) {
        result = { error: err.message };
        buildLog.push({ tool: tc.name, args: tc.args, success: false, error: err.message });
      }

      // Record tool result
      history.push({
        role: 'tool_result',
        tool_use_id: tc.id,
        content: result
      });
    }
  }

  // Batch commit all pending writes in a single commit
  const isBuild = (mode || 'modify') === 'build';
  let commitResult = null;
  if (pendingWrites.length > 0) {
    const gh = makeGitHub(env);
    const commitMsg = isBuild
      ? \`BuildMySite: initial site build (\${pendingWrites.length} files)\`
      : \`BuildMySite: update \${pendingWrites.map(f => f.path).join(', ')}\`;
    commitResult = await gh.batchCommit(pendingWrites, commitMsg);
  }

  const cost = calcCost(model, totalPromptTokens, totalCompletionTokens);

  return {
    text: finalText,
    buildLog,
    commit: commitResult,
    usage: {
      model,
      provider,
      promptTokens: totalPromptTokens,
      completionTokens: totalCompletionTokens,
      costUsd: Math.round(cost * 10000) / 10000
    }
  };
}

export default async function handler(req, res) {
  // CORS preflight
  if (req.method === 'OPTIONS') {
    return res.status(200).end();
  }

  if (req.method !== 'POST') {
    return res.status(405).json({ error: 'POST only' });
  }

  // Rate limiting
  const ip = req.headers['x-forwarded-for']?.split(',')[0]?.trim() || 'unknown';
  if (isAgentRateLimited(ip)) {
    return res.status(429).json({ error: 'Too many requests. Please wait a few minutes.' });
  }

  // Auth check
  const authHeader = req.headers.authorization || '';
  const token = authHeader.replace('Bearer ', '');
  const adminToken = process.env.ADMIN_TOKEN;

  if (!adminToken || token !== adminToken) {
    return res.status(401).json({ error: 'Unauthorized' });
  }

  const { message, businessInfo, mode } = req.body || {};
  const agentMode = mode === 'build' ? 'build' : 'modify';

  // In build mode, construct the prompt from businessInfo. In modify mode, message is required.
  let userMessage;
  if (agentMode === 'build') {
    if (!businessInfo || !businessInfo.name) {
      return res.status(400).json({ error: 'Business name is required for build mode' });
    }
    userMessage = buildInitialPrompt(businessInfo);
  } else {
    if (!message) {
      return res.status(400).json({ error: 'Message is required' });
    }
    if (typeof message !== 'string' || message.length > 10_000) {
      return res.status(400).json({ error: 'Message must be a string under 10,000 characters' });
    }
    userMessage = message;
  }

  // Own-key support: user can provide their own API key via header
  const userApiKey = req.headers['x-user-api-key'];
  const usingOwnKey = !!userApiKey;

  // Build environment from Vercel env vars
  const env = {
    AI_API_KEY: usingOwnKey ? userApiKey : process.env.AI_API_KEY,
    AI_MODEL: process.env.AI_MODEL || 'claude-sonnet-4-6',
    GITHUB_TOKEN: process.env.GITHUB_TOKEN,
    GITHUB_REPO: process.env.GITHUB_REPO,
    GITHUB_BRANCH: process.env.GITHUB_BRANCH || 'main',
  };

  // Usage gate: check/increment monthly edit count (skip if using own key)
  if (!usingOwnKey && agentMode !== 'build') {
    try {
      const gateR = await fetch('https://www.eonriskservices.com/api/usage-gate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ githubRepo: env.GITHUB_REPO, action: 'increment' })
      });
      if (gateR.status === 402) {
        const gateData = await gateR.json();
        return res.status(402).json({
          error: gateData.error || 'Free plan limit reached',
          used: gateData.used,
          limit: gateData.limit,
          upgradeUrl: gateData.upgradeUrl
        });
      }
      // Any other non-OK status: fail open (log and proceed)
      if (!gateR.ok) {
        console.error('Usage gate returned', gateR.status);
      }
    } catch (gateErr) {
      // Fail open — usage gate is down, let request through
      console.error('Usage gate unreachable:', gateErr.message);
    }
  }

  // Validate required env vars
  const missing = [];
  if (!env.AI_API_KEY) missing.push('AI_API_KEY');
  if (!env.GITHUB_TOKEN) missing.push('GITHUB_TOKEN');
  if (!env.GITHUB_REPO) missing.push('GITHUB_REPO');
  if (missing.length > 0) {
    return res.status(500).json({
      error: \`Missing environment variables: \${missing.join(', ')}\`,
      hint: 'Set these in your Vercel project settings.'
    });
  }

  // Validate model is approved
  if (!APPROVED_MODELS[env.AI_MODEL]) {
    return res.status(400).json({
      error: \`Model "\${env.AI_MODEL}" is not approved\`,
      approved: Object.keys(APPROVED_MODELS)
    });
  }

  try {
    const result = await runAgent(userMessage, env, businessInfo || {}, agentMode);
    return res.status(200).json(result);
  } catch (err) {
    console.error('Agent error:', err);
    return res.status(500).json({
      error: err.message,
      hint: 'Check your API key, GitHub token, and model configuration.'
    });
  }
}

function extractCssVariables(css) {

      fetchGitHubFile(repo, branch, 'index.html', ghHeaders)
    ]);

    const cssVars = cssContent ? extractCssVariables(cssContent) : '(no CSS file yet)';
    const navHtml = indexContent ? extractNav(indexContent) : '(no index.html yet)';
    const pageTitle = indexContent ? extractTitle(indexContent) : '(no title)';

    const metaPrompt = buildMetaPrompt(fileList, cssVars, navHtml, pageTitle);

    // Call Gemini Flash via OpenAI-compatible endpoint
    const r = await fetch('https://generativelanguage.googleapis.com/v1beta/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': \`Bearer \${apiKey}\`
      },
      body: JSON.stringify({
        model: ENHANCE_MODEL,
        messages: [
          { role: 'system', content: metaPrompt },
          { role: 'user', content: message }
        ],
        temperature: 0.3,
        max_tokens: 2048
      })
    });

    if (!r.ok) {
      const errText = await r.text();
      throw new Error(\`Gemini \${r.status}: \${errText}\`);
    }

    const data = await r.json();
    const enhancedPrompt = data.choices?.[0]?.message?.content || '';
    const usage = data.usage || {};
    const cost = calcCost(usage.prompt_tokens || 0, usage.completion_tokens || 0);

    return res.status(200).json({
      enhancedPrompt,
      originalMessage: message,
      model: ENHANCE_MODEL,
      costUsd: Math.round(cost * 10000) / 10000
    });

  } catch (err) {
    console.error('Enhance error:', err);
    return res.status(500).json({ error: err.message });
  }
}

// BUILDMYSITE — Contact Form Handler
// Receives form submissions, validates, sends email via Resend.
// Falls back to logging if Resend is not configured.
// ============================================================

import { Resend } from 'resend';

// Simple in-memory rate limiter (per IP, resets on cold start)
const submissions = new Map();
const RATE_LIMIT = 5;         // max submissions
const RATE_WINDOW = 600_000;  // per 10 minutes

function isRateLimited(ip) {
  const now = Date.now();
  const record = submissions.get(ip);
  if (!record || now - record.firstAt > RATE_WINDOW) {
    submissions.set(ip, { count: 1, firstAt: now });
    return false;
  }
  record.count++;
  return record.count > RATE_LIMIT;
}

// Basic input sanitisation — strip HTML tags
function sanitise(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/<[^>]*>/g, '').trim();
}

// Validate email format
function isValidEmail(email) {
  return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email);
}

export default async function handler(req, res) {
  // CORS preflight
  if (req.method === 'OPTIONS') {
    return res.status(200).end();
  }

  if (req.method !== 'POST') {
    return res.status(405).json({ error: 'POST only' });
  }

  // Rate limit by IP
  const ip = req.headers['x-forwarded-for']?.split(',')[0]?.trim() || req.socket?.remoteAddress || 'unknown';
  if (isRateLimited(ip)) {
    return res.status(429).json({ error: 'Too many submissions. Please try again later.' });
  }

  // Parse and validate input
  const name    = sanitise(req.body?.name);
  const email   = sanitise(req.body?.email);
  const phone   = sanitise(req.body?.phone || '');
  const message = sanitise(req.body?.message);

  if (!name || !email || !message) {
    return res.status(400).json({ error: 'Name, email, and message are required.' });
  }

  if (name.length > 200 || email.length > 200 || phone.length > 50 || message.length > 5000) {
    return res.status(400).json({ error: 'Input exceeds maximum length.' });
  }

  if (!isValidEmail(email)) {
    return res.status(400).json({ error: 'Invalid email address.' });
  }

  // Determine recipient
  const contactEmail = process.env.CONTACT_EMAIL;
  const resendKey    = process.env.RESEND_API_KEY;

  // If Resend is configured, send the email
  if (resendKey && contactEmail) {
    try {
      const resend = new Resend(resendKey);
      await resend.emails.send({
        from: 'BuildMySite Contact <onboarding@resend.dev>',
        to: contactEmail,
        replyTo: email,
        subject: \`New message from \${name}\`,
        html: \`
          <h2>New Contact Form Submission</h2>
          <p><strong>Name:</strong> \${name}</p>
          <p><strong>Email:</strong> \${email}</p>
          \${phone ? \`<p><strong>Phone:</strong> \${phone}</p>\` : ''}
          <hr>
          <p>\${message.replace(/\\n/g, '<br>')}</p>
          <hr>
          <p style="color: #888; font-size: 12px;">Sent via your website contact form, powered by BuildMySite.</p>
        \`.trim()
      });
      return res.status(200).json({ success: true, message: 'Message sent successfully.' });
    } catch (err) {
      console.error('Resend error:', err);
      return res.status(500).json({ error: 'Failed to send message. Please try again or contact us directly.' });
    }
  }

  // Fallback: log to Vercel console (no email configured yet)
  console.log('--- Contact Form Submission ---');
  console.log(\`Name: \${name}\`);
  console.log(\`Email: \${email}\`);
  if (phone) console.log(\`Phone: \${phone}\`);
  console.log(\`Message: \${message}\`);
  console.log('--- (RESEND_API_KEY or CONTACT_EMAIL not configured — email not sent) ---');

  return res.status(200).json({
    success: true,
    message: 'Message received.',
    _note: 'Email delivery not configured. Set RESEND_API_KEY and CONTACT_EMAIL environment variables.'
  });
}
`,

  'api/revert.js': `// ============================================================
// BUILDMYSITE REVERT ENDPOINT
// Deterministic git revert: fetches file content from the parent
// commit and overwrites the current version. No LLM involved.
// ============================================================

export default async function handler(req, res) {
  if (req.method === 'OPTIONS') return res.status(200).end();
  if (req.method !== 'POST') return res.status(405).json({ error: 'POST only' });

  // Auth
  const authHeader = req.headers.authorization || '';
  const token = authHeader.replace('Bearer ', '');
  const adminToken = process.env.ADMIN_TOKEN;
  if (!adminToken || token !== adminToken) {
    return res.status(401).json({ error: 'Unauthorized' });
  }

  const { filePath, commitSha } = req.body || {};
  if (!filePath || typeof filePath !== 'string') {
    return res.status(400).json({ error: 'filePath is required' });
  }
  if (!commitSha || typeof commitSha !== 'string') {
    return res.status(400).json({ error: 'commitSha is required (the commit to revert FROM)' });
  }

  const GITHUB_TOKEN = process.env.GITHUB_TOKEN;
  const GITHUB_REPO = process.env.GITHUB_REPO;
  const GITHUB_BRANCH = process.env.GITHUB_BRANCH || 'main';

  if (!GITHUB_TOKEN || !GITHUB_REPO) {
    return res.status(500).json({ error: 'Missing GITHUB_TOKEN or GITHUB_REPO env vars' });
  }

  const headers = {
    'Authorization': \`Bearer \${GITHUB_TOKEN}\`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };

  try {
    // 1. Get the parent commit SHA (the state before the bad commit)
    const commitR = await fetch(
      \`https://api.github.com/repos/\${GITHUB_REPO}/git/commits/\${commitSha}\`,
      { headers }
    );
    if (!commitR.ok) throw new Error(\`Failed to fetch commit \${commitSha}: \${commitR.status}\`);
    const commitData = await commitR.json();

    const parentSha = commitData.parents?.[0]?.sha;
    if (!parentSha) {
      return res.status(400).json({ error: 'No parent commit found — cannot revert the initial commit' });
    }

    // 2. Fetch the file content at the parent commit
    const fileR = await fetch(
      \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${filePath}?ref=\${parentSha}\`,
      { headers }
    );

    if (fileR.status === 404) {
      // File didn't exist before this commit — revert means delete it
      const currentR = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${filePath}?ref=\${GITHUB_BRANCH}\`,
        { headers }
      );
      if (!currentR.ok) {
        return res.status(404).json({ error: \`File \${filePath} not found on current branch either\` });
      }
      const currentData = await currentR.json();
      const delR = await fetch(
        \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${filePath}\`,
        {
          method: 'DELETE',
          headers,
          body: JSON.stringify({
            message: \`Revert: remove \${filePath} (did not exist before \${commitSha.slice(0, 7)})\`,
            sha: currentData.sha,
            branch: GITHUB_BRANCH
          })
        }
      );
      if (!delR.ok) throw new Error(\`Failed to delete \${filePath}: \${delR.status}\`);
      return res.status(200).json({ reverted: filePath, action: 'deleted', parentSha });
    }

    if (!fileR.ok) throw new Error(\`Failed to fetch \${filePath} at parent \${parentSha}: \${fileR.status}\`);
    const fileData = await fileR.json();
    const oldContent = fileData.content; // Already base64 from GitHub

    // 3. Get the current file SHA (needed for the PUT)
    const currentR = await fetch(
      \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${filePath}?ref=\${GITHUB_BRANCH}\`,
      { headers }
    );
    if (!currentR.ok) throw new Error(\`Failed to fetch current \${filePath}: \${currentR.status}\`);
    const currentData = await currentR.json();

    // 4. Overwrite with the parent version
    const putR = await fetch(
      \`https://api.github.com/repos/\${GITHUB_REPO}/contents/\${filePath}\`,
      {
        method: 'PUT',
        headers,
        body: JSON.stringify({
          message: \`Revert \${filePath} to pre-\${commitSha.slice(0, 7)} state\`,
          content: oldContent,
          sha: currentData.sha,
          branch: GITHUB_BRANCH
        })
      }
    );
    if (!putR.ok) {
      const t = await putR.text();
      throw new Error(\`Failed to write reverted \${filePath}: \${putR.status} \${t}\`);
    }

    return res.status(200).json({ reverted: filePath, action: 'restored', parentSha });
  } catch (err) {
    console.error('Revert error:', err);
    return res.status(500).json({ error: err.message });
  }
}
`,

// BUILDMYSITE — Image Upload Handler
// Accepts image uploads (logo, hero), commits to GitHub repo
// via Contents API. Returns relative URL for the site.
// ============================================================

// Rate limiting
const uploads = new Map();
const RATE_LIMIT = 10;
const RATE_WINDOW = 300_000; // 5 minutes

function isRateLimited(ip) {
  const now = Date.now();
  const record = uploads.get(ip);
  if (!record || now - record.firstAt > RATE_WINDOW) {
    uploads.set(ip, { count: 1, firstAt: now });
    return false;
  }
  record.count++;
  return record.count > RATE_LIMIT;
}

const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp', 'image/svg+xml'];
const MAX_SIZE = 5 * 1024 * 1024; // 5MB

export default async function handler(req, res) {
  if (req.method === 'OPTIONS') {
    return res.status(200).end();
  }

  if (req.method !== 'POST') {
    return res.status(405).json({ error: 'POST only' });
  }

  // Rate limit
  const ip = req.headers['x-forwarded-for']?.split(',')[0]?.trim() || 'unknown';
  if (isRateLimited(ip)) {
    return res.status(429).json({ error: 'Too many uploads. Please wait a few minutes.' });
  }

  // Auth check
  const authHeader = req.headers.authorization || '';
  const token = authHeader.replace('Bearer ', '');
  const adminToken = process.env.ADMIN_TOKEN;

  if (!adminToken || token !== adminToken) {
    return res.status(401).json({ error: 'Unauthorized' });
  }

  // Check GitHub config
  const ghToken = process.env.GITHUB_TOKEN;
  const ghRepo = process.env.GITHUB_REPO;

  if (!ghToken || !ghRepo) {
    return res.status(500).json({
      error: 'GitHub not configured',
      hint: 'Set GITHUB_TOKEN and GITHUB_REPO in your Vercel project settings.'
    });
  }

  try {
    const contentType = req.headers['content-type'] || '';

    if (!ALLOWED_TYPES.includes(contentType.split(';')[0])) {
      return res.status(400).json({
        error: \`Invalid file type: \${contentType}. Allowed: \${ALLOWED_TYPES.join(', ')}\`
      });
    }

    const filename = req.query.filename || req.headers['x-filename'] || \`upload-\${Date.now()}\`;

    // Read body as buffer
    const chunks = [];
    for await (const chunk of req) {
      chunks.push(chunk);
    }
    const body = Buffer.concat(chunks);

    if (body.length > MAX_SIZE) {
      return res.status(400).json({ error: \`File too large: \${(body.length / 1024 / 1024).toFixed(1)}MB (max 5MB)\` });
    }

    if (body.length === 0) {
      return res.status(400).json({ error: 'Empty file' });
    }

    const base64Content = body.toString('base64');
    const path = \`images/\${filename}\`;
    const apiUrl = \`https://api.github.com/repos/\${ghRepo}/contents/\${path}\`;
    const headers = {
      Authorization: \`token \${ghToken}\`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    };

    // Check if file already exists (need SHA to update)
    let sha;
    const existing = await fetch(apiUrl, { headers });
    if (existing.ok) {
      const data = await existing.json();
      sha = data.sha;
    }

    // Commit to GitHub
    const commitBody = {
      message: \`Upload \${filename}\`,
      content: base64Content,
      branch: 'main',
    };
    if (sha) commitBody.sha = sha;

    const commitRes = await fetch(apiUrl, {
      method: 'PUT',
      headers,
      body: JSON.stringify(commitBody),
    });

    if (!commitRes.ok) {
      const err = await commitRes.json();
      throw new Error(err.message || 'GitHub commit failed');
    }

    return res.status(200).json({
      url: \`/\${path}\`,
      size: body.length,
      filename,
    });

  } catch (err) {
    console.error('Upload error:', err);
    return res.status(500).json({
      error: 'Upload failed',
      hint: err.message
    });
  }
}
`

// ---- setup-agent.js (state machine) ----
// ============================================================
// BUILDMYSITE — Conversational Setup Agent
// A state machine that drives the chat-based setup flow.
// Runs locally in the user's browser — no server needed.
// Imports: setup.js (API helpers), discover.js (AI discovery),
//          site-kit-bundle.js (files to push to GitHub)
// ============================================================




// Load site-kit files into the setup module

// ---- OS detection ----
function detectOS() {
  const p = navigator.platform || '';
  const ua = navigator.userAgent || '';
  if (p.startsWith('Mac') || /Macintosh/.test(ua)) return 'mac';
  if (p.startsWith('Win') || /Windows/.test(ua))    return 'windows';
  return 'linux';
}

// ---- State definitions ----
const STATES = {
  // Phase A: Welcome
  WELCOME:          'WELCOME',

  // Phase B: GitHub
  GITHUB_INTRO:     'GITHUB_INTRO',
  GITHUB_TOKEN:     'GITHUB_TOKEN',
  GITHUB_VALIDATE:  'GITHUB_VALIDATE',

  // Phase C: Vercel
  VERCEL_INTRO:     'VERCEL_INTRO',
  VERCEL_TOKEN:     'VERCEL_TOKEN',
  VERCEL_VALIDATE:  'VERCEL_VALIDATE',

  // Phase D: Discovery
  BIZ_NAME:         'BIZ_NAME',
  BIZ_DISCOVER:     'BIZ_DISCOVER',
  BIZ_REVIEW:       'BIZ_REVIEW',

  // Phase E: Page Selection
  PAGE_SELECT:      'PAGE_SELECT',

  // Phase F: Build
  BUILD_CONFIRM:    'BUILD_CONFIRM',
  BUILD_RUNNING:    'BUILD_RUNNING',
  BUILD_COMPLETE:   'BUILD_COMPLETE',

  // Phase G: Image Upload (optional)
  IMAGE_UPLOAD:     'IMAGE_UPLOAD',

  // Phase H: Domain (optional)
  DOMAIN_PROMPT:    'DOMAIN_PROMPT',
};

// ---- localStorage persistence ----
const STORAGE_KEY = 'buildmysite_state';

function saveState(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function clearState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
}

// ---- Slug generation ----
function makeRepoSlug(name) {
  if (!name) return 'my-website';
  // Strip everything after a dash/pipe separator (e.g. "Copper Kettle — A Café in Wexford" → "Copper Kettle")
  let slug = name.split(/\s*[—–|]\s*/)[0].trim();
  // Remove common filler words
  slug = slug.replace(/\b(the|a|an|and|of|in|at|for|by)\b/gi, '');
  // Convert to URL-safe slug
  slug = slug.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  // Limit length
  slug = slug.slice(0, 40).replace(/-$/, '');
  return slug || 'my-website';
}

// ---- SetupAgent class ----
class SetupAgent {
  constructor(ui) {
    this.ui = ui;
    this.state = STATES.WELCOME;
    this.os = detectOS();

    // Collected data
    this.githubToken = null;
    this.githubLogin = null;
    this.vercelToken = null;
    this.vercelUsername = null;
    this.businessName = null;
    this.businessLocation = null;
    this.businessInfo = null;
    this.selectedPages = null;
    this.repoName = null;
    this.projectId = null;
    this.projectSlug = null;
    this.siteUrl = null;
    this.adminToken = null;
    this.repoUrl = null;
  }

  // Persist current progress
  _save() {
    saveState({
      githubToken: this.githubToken, githubLogin: this.githubLogin,
      vercelToken: this.vercelToken, vercelUsername: this.vercelUsername,
      businessInfo: this.businessInfo, repoName: this.repoName,
      selectedPages: this.selectedPages,
    });
  }

  // Restore from localStorage
  _restore(saved) {
    this.githubToken = saved.githubToken;
    this.githubLogin = saved.githubLogin;
    this.vercelToken = saved.vercelToken;
    this.vercelUsername = saved.vercelUsername;
    this.businessInfo = saved.businessInfo;
    this.repoName = saved.repoName;
    this.selectedPages = saved.selectedPages;
  }

  // Figure out which state to resume from based on saved data
  _resumeState(saved) {
    if (saved.selectedPages && saved.businessInfo && saved.vercelToken && saved.githubToken) return STATES.BUILD_CONFIRM;
    if (saved.businessInfo && saved.vercelToken && saved.githubToken) return STATES.PAGE_SELECT;
    if (saved.vercelToken && saved.githubToken) return STATES.BIZ_NAME;
    if (saved.githubToken) return STATES.VERCEL_INTRO;
    return null;
  }

  // Start the conversation
  async start() {
    const saved = loadState();
    if (saved && saved.githubToken) {
      // We have saved progress — offer to resume
      const resumeState = this._resumeState(saved);
      if (resumeState) {
        const parts = [];
        if (saved.githubLogin) parts.push(`GitHub: @${saved.githubLogin}`);
        if (saved.vercelUsername) parts.push(`Vercel: ${saved.vercelUsername}`);
        if (saved.businessInfo) parts.push(`Business: ${saved.businessInfo.name}`);

        this.ui.addMessage('agent', `Welcome back! I have your previous progress saved:\n\n**${parts.join(' · ')}**\n\nWant to pick up where you left off, or start fresh?`);

        this.ui.addButtons([
          { label: 'Continue', action: 'resume' },
          { label: 'Start fresh', action: 'start-fresh' },
        ]);

        this.ui.onAction = async (action) => {
          if (action === 'resume') {
            this._restore(saved);
            // Show progress pips for completed steps
            let step = 0;
            if (this.githubToken) step = 1;
            if (this.vercelToken) step = 2;
            if (this.businessInfo) step = 3;
            if (this.selectedPages) step = 4;
            this.ui.updateProgress(step);
            await this.enter(resumeState);
          } else {
            clearState();
            await this.enter(STATES.WELCOME);
          }
        };
        return;
      }
    }
    await this.enter(STATES.WELCOME);
  }

  // Main state handler — called on user input or button clicks
  async handleInput(value) {
    switch (this.state) {
      case STATES.GITHUB_TOKEN:
        return; // Device flow — no text input needed
      case STATES.VERCEL_TOKEN:
        return this.enter(STATES.VERCEL_VALIDATE, value);
      case STATES.BIZ_NAME:
        return this.enter(STATES.BIZ_DISCOVER, value);
      case STATES.BIZ_REVIEW:
        // User typed something — treat as wanting to edit
        if (value && value.trim()) {
          this.ui.addMessage('user', value);
          this.ui.addMessage('agent', 'Let me open the edit form so you can update the details.');
          return this.doEditForm();
        }
        return;
      case STATES.DOMAIN_PROMPT:
        return this.handleDomain(value);
      case 'IMAGE_STYLE_PROMPT':
        this._imageStyle = (value || '').trim();
        this.ui.setInputVisible(false);
        return this.enter(STATES.BUILD_RUNNING);
      default:
        break;
    }
  }

  // Handle button actions
  async handleAction(action, data) {
    switch (action) {
      case 'confirm-build':
        return this.enter(STATES.BUILD_RUNNING);
      case 'edit-info':
        return this.doEditForm();
      case 'save-edits':
        return this.doSaveEdits(data);
      case 'confirm-info':
        return this.enter(STATES.PAGE_SELECT);
      case 'skip-domain':
        this.ui.addMessage('agent', "No problem. You can add a custom domain anytime from Vercel's dashboard. Enjoy your new website!");
        return;
      case 'confirm-pages':
        return this.enter(STATES.BUILD_CONFIRM);
      case 'add-domain':
        return this.enter(STATES.DOMAIN_PROMPT);
      case 'skip-images':
        this.ui.addMessage('agent', "No problem! You can add images later from the admin panel. Let's wrap up.");
        return this.enter(STATES.DOMAIN_PROMPT);
      case 'upload-images':
        return this.doImageUploadProcess();
      case 'generate-images':
        return this.doGenerateImages();
      default:
        break;
    }
  }

  // Enter a new state
  async enter(newState, input) {
    this.state = newState;

    switch (newState) {
      case STATES.WELCOME:
        return this.doWelcome();
      case STATES.GITHUB_INTRO:
        return this.doGitHubIntro();
      case STATES.GITHUB_TOKEN:
        return this.doGitHubToken();
      case STATES.GITHUB_VALIDATE:
        return this.doGitHubValidate(input);
      case STATES.VERCEL_INTRO:
        return this.doVercelIntro();
      case STATES.VERCEL_TOKEN:
        return this.doVercelToken();
      case STATES.VERCEL_VALIDATE:
        return this.doVercelValidate(input);
      case STATES.BIZ_NAME:
        return this.doBizName();
      case STATES.BIZ_DISCOVER:
        return this.doBizDiscover(input);
      case STATES.BIZ_REVIEW:
        return this.doBizReview();
      case STATES.PAGE_SELECT:
        return this.doPageSelect();
      case STATES.BUILD_CONFIRM:
        return this.doBuildConfirm();
      case STATES.BUILD_RUNNING:
        return this.doBuildRunning();
      case STATES.BUILD_COMPLETE:
        return this.doBuildComplete();
      case STATES.IMAGE_UPLOAD:
        return this.doImageUpload();
      case STATES.DOMAIN_PROMPT:
        return this.doDomainPrompt();
    }
  }

  // ================================================================
  // Phase A: Welcome
  // ================================================================

  doWelcome() {
    this.ui.addMessage('agent', `Hey! I'm your setup assistant. I'll get your website live in about 10 minutes.

I just need two things from you: a GitHub account (to store your code) and a Vercel account (to host your site for free). The AI is included — no API key needed.`);

    this.ui.addButtons([
      { label: "Let's go!", action: 'start-setup' },
    ]);

    this.ui.onAction = async (action) => {
      await this.enter(STATES.GITHUB_INTRO);
    };
  }

  // ================================================================
  // Phase B: GitHub
  // ================================================================

  doGitHubIntro() {
    const signupUrl = 'https://github.com/signup';
    this.ui.addMessage('agent', `Next: GitHub. This is where your website's code lives — your own repository, under your control.

Do you already have a GitHub account?`);

    this.ui.addButtons([
      { label: 'Yes, I have GitHub', action: 'has-github' },
      { label: 'No, I need to sign up', action: 'no-github', url: signupUrl },
    ]);

    this.ui.onAction = async (action) => {
      if (action === 'has-github' || action === 'no-github') {
        if (action === 'no-github') {
          this.ui.addMessage('agent', `No problem — sign up at <a href="${signupUrl}" target="_blank" rel="noopener">github.com/signup</a> (it's free). Come back here when you're done.`);
        }
        await this.enter(STATES.GITHUB_TOKEN);
      }
    };
  }

  async doGitHubToken() {
    this.ui.setInputVisible(false);
    this.ui.addMessage('agent', 'Starting GitHub connection...', true);

    try {
      const flow = await startGitHubDeviceFlow();
      this._deviceCode = flow.device_code;

      this.ui.addMessage('agent', `<div class="chat-card">
<div class="chat-card__title">Connect your GitHub account</div>
<p>Click the button below — it will open GitHub in a new tab.</p>
<p>When GitHub asks for a code, enter: <strong style="font-size:1.3em;letter-spacing:0.1em;user-select:all">${flow.user_code}</strong> <button class="copy-btn" onclick="navigator.clipboard.writeText('${flow.user_code}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)" title="Copy code">Copy</button></p>
<p>Then click <strong>"Authorize"</strong>.</p>
<p class="chat-hint">I'll detect it automatically once you've approved.</p>
</div>`, true);

      this.ui.addButtons([
        { label: 'Connect GitHub', action: 'open-github-auth', url: flow.verification_uri },
      ]);

      this.ui.onAction = async (action) => {
        if (action === 'open-github-auth') {
          this.ui.addMessage('agent', `Waiting for you to authorise on GitHub...`, true);
          await this.enter(STATES.GITHUB_VALIDATE);
        }
      };
    } catch (err) {
      this.ui.addMessage('agent', `Couldn't start GitHub connection: ${err.message}. Let's try again.`);
      this.ui.addButtons([
        { label: 'Try again', action: 'retry-github' },
      ]);
      this.ui.onAction = async (action) => {
        if (action === 'retry-github') await this.enter(STATES.GITHUB_TOKEN);
      };
    }
  }

  async doGitHubValidate() {
    try {
      const token = await pollGitHubToken(this._deviceCode);

      const result = await validateGitHubToken(token);
      if (!result.valid) {
        this.ui.addMessage('agent', `Got a token but it didn't validate: ${result.error || 'unknown error'}. Let's try again.`);
        this.ui.addButtons([
          { label: 'Try again', action: 'retry-github' },
        ]);
        this.ui.onAction = async (action) => {
          if (action === 'retry-github') await this.enter(STATES.GITHUB_TOKEN);
        };
        return;
      }

      this.githubToken = token;
      this.githubLogin = result.login;
      this._save();

      this.ui.addMessage('agent', `Connected to GitHub as <strong>@${result.login}</strong>. Your code will live under your account.`);
      this.ui.updateProgress(1);

      // Prompt to install Vercel GitHub App
      const vercelAppUrl = 'https://github.com/apps/vercel';
      this.ui.addMessage('agent', `<div class="chat-card">
<div class="chat-card__title">One more GitHub step</div>
<p>Vercel needs permission to read your GitHub repos so it can auto-deploy your site. Click below to install the Vercel app on your GitHub account.</p>
<p class="chat-hint">On the GitHub page, click <strong>"Install"</strong> and allow access to <strong>all repositories</strong> (or select the one we'll create). Then come back here.</p>
</div>`, true);

      this.ui.addButtons([
        { label: 'Install Vercel on GitHub', action: 'install-vercel-app', url: vercelAppUrl },
        { label: 'Already installed', action: 'vercel-app-done' },
      ]);

      this.ui.onAction = async (action) => {
        if (action === 'install-vercel-app' || action === 'vercel-app-done') {
          if (action === 'install-vercel-app') {
            this.ui.addMessage('agent', `Once you've clicked <strong>Install</strong> on GitHub, come back here.`);
            this.ui.addButtons([
              { label: 'Done — continue', action: 'vercel-app-done' },
            ]);
            return;
          }
          await this.enter(STATES.VERCEL_INTRO);
        }
      };
    } catch (err) {
      this.ui.addMessage('agent', `GitHub authorisation timed out or was denied. No worries — let's try again.`);
      this.ui.addButtons([
        { label: 'Try again', action: 'retry-github' },
      ]);
      this.ui.onAction = async (action) => {
        if (action === 'retry-github') await this.enter(STATES.GITHUB_TOKEN);
      };

  // ================================================================
  // Phase C: Vercel
  // ================================================================

  doVercelIntro() {
    const signupUrl = 'https://vercel.com/signup';
    this.ui.addMessage('agent', `Last connection: Vercel. This hosts your website for free — global CDN, SSL, the works.

The easiest way: sign up with your GitHub account (one click).`);

    this.ui.addButtons([
      { label: 'I have Vercel', action: 'has-vercel' },
      { label: 'Sign up with GitHub', action: 'no-vercel', url: signupUrl },
    ]);

    this.ui.onAction = async (action) => {
      if (action === 'has-vercel' || action === 'no-vercel') {
        if (action === 'no-vercel') {
          this.ui.addMessage('agent', `Head to <a href="${signupUrl}" target="_blank" rel="noopener">vercel.com/signup</a> and click "Continue with GitHub". Done in 30 seconds.`);
        }
        await this.enter(STATES.VERCEL_TOKEN);
      }
    };
  }

  doVercelToken() {
    // Primary: OAuth popup. Fallback: manual token paste.
    const VERCEL_INTEGRATION_SLUG = 'buildmysite';
    const oauthState = Math.random().toString(36).slice(2);
    this._vercelOAuthState = oauthState;

    this.ui.addMessage('agent', `Click below to connect your Vercel account. A popup will open — just approve the connection and you're done.`);

    this.ui.addButtons([
      { label: 'Connect Vercel', action: 'vercel-oauth' },
      { label: 'Paste token instead', action: 'vercel-manual' },
    ]);

    this.state = STATES.VERCEL_TOKEN;

    // Listen for OAuth postMessage from popup
    const messageHandler = (event) => {
      if (event.data && event.data.type === 'vercel-oauth-token' && event.data.state === oauthState) {
        window.removeEventListener('message', messageHandler);
        this.enter(STATES.VERCEL_VALIDATE, event.data.token);
      }
    };
    window.addEventListener('message', messageHandler);

    this.ui.onAction = async (action) => {
      if (action === 'vercel-oauth') {
        const oauthUrl = `https://vercel.com/integrations/${VERCEL_INTEGRATION_SLUG}/new?state=${oauthState}`;
        window.open(oauthUrl, 'vercel-oauth', 'width=600,height=700,popup=yes');
        this.ui.addMessage('agent', 'Waiting for you to approve in the popup...', true);
      } else if (action === 'vercel-manual') {
        window.removeEventListener('message', messageHandler);
        const tokenUrl = 'https://vercel.com/account/tokens';
        this.ui.addMessage('agent', `<div class="chat-card">
<div class="chat-card__title">Create a Vercel token</div>
<ol class="chat-steps">
<li>Go to <a href="${tokenUrl}" target="_blank" rel="noopener">vercel.com/account/tokens</a></li>
<li>Click <strong>"Create"</strong></li>
<li>Name it <strong>"BuildMySite"</strong>, scope: Full Account</li>
<li>Copy the token and paste it below</li>
</ol>
</div>`, true);
        this.ui.setInputVisible(true, 'Paste your Vercel token here...');
      }
    };
  }

  async doVercelValidate(token) {
    if (!token || !token.trim()) return;
    token = token.trim();

    this.ui.setInputVisible(false);
    this.ui.addMessage('agent', 'Checking your Vercel token...', true);

    const result = await validateVercelToken(token);
    if (!result.valid) {
      this.ui.addMessage('agent', `That token didn't work: ${result.error || 'invalid'}. Try creating a new one.`);
      this.ui.setInputVisible(true, 'Paste your Vercel token here...');
      this.state = STATES.VERCEL_TOKEN;
      return;
    }

    this.vercelToken = token;
    this.vercelUsername = result.username || result.name;
    this._save();

    this.ui.addMessage('agent', `Vercel connected as <strong>${this.vercelUsername}</strong>. Both connections are set up!`);
    this.ui.updateProgress(2);

    await this.enter(STATES.BIZ_NAME);
  }

  // ================================================================
  // Phase D: Business Discovery
  // ================================================================

  doBizName() {
    this.ui.addMessage('agent', `Now the fun part. Tell me about your business — what's it called, and where is it? Something like "Murphy's Bakery, Cork" or "Joe's Plumbing, Dublin 12".`);
    this.ui.setInputVisible(true, "e.g. Murphy's Bakery, Cork");
    this.state = STATES.BIZ_NAME;
  }

  async doBizDiscover(input) {
    if (!input || !input.trim()) return;
    input = input.trim();

    // Parse business name and optional location
    const parts = input.split(',').map(s => s.trim());
    this.businessName = parts[0];
    this.businessLocation = parts.slice(1).join(', ') || null;

    this.ui.setInputVisible(false);
    this.ui.addMessage('agent', `Searching for <strong>${this.businessName}</strong>${this.businessLocation ? ` in ${this.businessLocation}` : ''}...`, true);

    try {
      this.businessInfo = await discoverBusiness(
        this.businessName,
        this.businessLocation
      );
    } catch (err) {
      console.error('Discovery failed:', err);
      this.businessInfo = { name: this.businessName, found: false, _error: err.message };
    }

    if (this.businessInfo.found === false) {
      this.businessInfo = this.businessInfo || {};
      this.businessInfo.name = this.businessName;
      const errDetail = this.businessInfo._error ? ` <span style="font-size:0.8rem;color:var(--text-light)">(${this.businessInfo._error})</span>` : '';
      this.ui.addMessage('agent', `I couldn't find details online for "${this.businessName}".${errDetail} You can try again with more detail (e.g. add the town or what you do), or continue and fill in details manually.`);
      this.ui.addButtons([
        { label: 'Try again', action: 'retry-discover' },
        { label: 'Continue without', action: 'skip-discover' },
      ]);
      this.ui.onAction = async (action) => {
        if (action === 'retry-discover') {
          this.ui.addMessage('agent', 'Tell me the business name again — try adding the location or a short description, like "Red Books Wexford, independent bookshop".');
          this.ui.setInputVisible(true, 'Business name and details...');
          this.state = STATES.BIZ_NAME;
        } else {
          // Generate repo slug from extracted name (not raw input)
          this.repoName = makeRepoSlug((this.businessInfo && this.businessInfo.name) || this.businessName);
          this._save();
          await this.enter(STATES.BIZ_REVIEW);
        }
      };
      return;
    }

    // Generate repo slug from extracted name (not raw input)
    this.repoName = makeRepoSlug((this.businessInfo && this.businessInfo.name) || this.businessName);
    this._save();

    await this.enter(STATES.BIZ_REVIEW);
  }

  doBizReview() {
    const info = this.businessInfo;
    const fields = [];
    if (info.name)        fields.push(['Name', info.name]);
    if (info.type)        fields.push(['Type', info.type]);
    if (info.description) fields.push(['Description', info.description]);
    if (info.address)     fields.push(['Address', info.address]);
    if (info.phone)       fields.push(['Phone', info.phone]);
    if (info.email)       fields.push(['Email', info.email]);
    if (info.hours)       fields.push(['Hours', info.hours]);
    if (info.tagline)     fields.push(['Tagline', info.tagline]);
    if (info.services && info.services.length) {
      const svc = Array.isArray(info.services) ? info.services.join(', ') : info.services;
      fields.push(['Services', svc]);
    }

    let html = '<div class="chat-card"><div class="chat-card__title">Here\'s what I found</div>';
    if (fields.length === 0 || (fields.length === 1 && fields[0][0] === 'Name')) {
      html += '<p>I\'ll need you to fill in the details. The AI will use whatever you provide to write your website.</p>';
    }
    for (const [label, value] of fields) {
      html += `<div class="chat-card__row"><span class="chat-card__label">${label}</span><span class="chat-card__value">${value}</span></div>`;
    }
    html += `<div class="chat-card__row"><span class="chat-card__label">URL</span><span class="chat-card__value">${this.repoName}.vercel.app</span></div>`;
    html += '</div>';

    this.ui.addMessage('agent', html, true);
    this.ui.addMessage('agent', 'Does this look right? I can build your site with this, or you can tell me what to change.');

    this.ui.updateProgress(3);
    this.ui.setInputVisible(false);

    this.ui.addButtons([
      { label: 'Looks good — build it!', action: 'confirm-info' },
      { label: 'Let me edit this', action: 'edit-info' },
    ]);

    this.ui.onAction = async (action) => {
      await this.handleAction(action);
    };
  }

  doEditForm() {
    const info = this.businessInfo || {};
    const fields = [
      { key: 'name',        label: 'Name',        value: info.name || '' },
      { key: 'type',        label: 'Type',        value: info.type || '' },
      { key: 'description', label: 'Description', value: info.description || '', textarea: true },
      { key: 'address',     label: 'Address',     value: info.address || '' },
      { key: 'phone',       label: 'Phone',       value: info.phone || '' },
      { key: 'email',       label: 'Email',       value: info.email || '' },
      { key: 'hours',       label: 'Hours',       value: info.hours || '' },
      { key: 'tagline',     label: 'Tagline',     value: info.tagline || '' },
      { key: 'services',    label: 'Services',    value: Array.isArray(info.services) ? info.services.join(', ') : (info.services || '') },
    ];

    let html = '<div class="chat-card"><div class="chat-card__title">Edit your business info</div>';
    html += '<div class="edit-form" id="biz-edit-form">';
    for (const f of fields) {
      if (f.textarea) {
        html += `<div class="edit-field"><label>${f.label}</label><textarea data-key="${f.key}" rows="3">${f.value}</textarea></div>`;
      } else {
        html += `<div class="edit-field"><label>${f.label}</label><input type="text" data-key="${f.key}" value="${f.value.replace(/"/g, '&quot;')}"></div>`;
      }
    }
    html += '</div></div>';

    this.ui.addMessage('agent', html, true);

    this.ui.addButtons([
      { label: 'Save changes', action: 'save-edits' },
    ]);

    this.ui.onAction = async (action) => {
      await this.handleAction(action);
    };
  }

  doSaveEdits() {
    const form = document.getElementById('biz-edit-form');
    if (form) {
      const inputs = form.querySelectorAll('input[data-key], textarea[data-key]');
      inputs.forEach(el => {
        const key = el.dataset.key;
        let val = el.value.trim();
        if (key === 'services') {
          val = val ? val.split(',').map(s => s.trim()).filter(Boolean) : [];
        }
        this.businessInfo[key] = val;
      });
    }
    // Regenerate repo name from the (possibly edited) business name
    this.repoName = makeRepoSlug(this.businessInfo.name || this.businessName);
    this._save();
    this.ui.addMessage('agent', 'Updated! Here\'s the revised info:');
    return this.doBizReview();
  }

  // ================================================================
  // Phase E: Page Selection
  // ================================================================

  doPageSelect() {
    const bizType = (this.businessInfo && this.businessInfo.type || '').toLowerCase();

    // Smart defaults based on business type
    const isFood = /restaurant|cafe|bakery|bistro|pub|bar|coffee|pizza|takeaway|diner|kitchen|food|catering/i.test(bizType);
    const isVisual = /restaurant|venue|photographer|photography|salon|beauty|florist|architect|interior|gallery|hotel|b&b|guesthouse/i.test(bizType);

    const pages = [
      { id: 'home',         label: 'Home',          locked: true,  checked: true },
      { id: 'about',        label: 'About',         locked: false, checked: true },
      { id: 'services',     label: 'Services',      locked: false, checked: true },
      { id: 'contact',      label: 'Contact',       locked: true,  checked: true },
      { id: 'gallery',      label: 'Gallery',       locked: false, checked: isVisual },
      { id: 'menu',         label: 'Menu / Pricing', locked: false, checked: isFood },
      { id: 'testimonials', label: 'Testimonials',  locked: false, checked: false },
      { id: 'faq',          label: 'FAQ',           locked: false, checked: false },
    ];

    let html = '<div class="chat-card"><div class="chat-card__title">Choose your pages</div>';
    html += '<p style="font-size:0.88rem;color:var(--text-light);margin-bottom:12px">Select which pages to include on your site. Home and Contact are always included.</p>';
    html += '<div class="page-checklist" id="page-checklist">';
    for (const p of pages) {
      const checked = p.checked ? 'checked' : '';
      const disabled = p.locked ? 'disabled' : '';
      html += `<label class="page-check">
        <input type="checkbox" value="${p.id}" ${checked} ${disabled}>
        <span class="page-check__label">${p.label}</span>
      </label>`;
    }
    html += '</div></div>';

    this.ui.addMessage('agent', html, true);

    this.ui.addButtons([
      { label: 'Confirm pages', action: 'confirm-pages' },
    ]);

    this.ui.onAction = async (action) => {
      // Read checked pages from the DOM
      const checkboxes = document.querySelectorAll('#page-checklist input[type="checkbox"]');
      const selected = [];
      checkboxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });
      this.selectedPages = selected;
      this._save();
      this.ui.updateProgress(4);
      await this.handleAction(action);
    };
  }

  // ================================================================
  // Phase F: Build
  // ================================================================

  doBuildConfirm() {
    const hasImageGen = true; // AI images always available — EON provides the key
    this.ui.addMessage('agent', `Ready to build <strong>${this.businessInfo.name || this.businessName}</strong>'s website. Here's what I'll do:

1. Create a GitHub repo: <code>${this.githubLogin}/${this.repoName}</code>
2. Push the website engine (HTML, CSS, JS, API)
3. Create a Vercel project linked to the repo
4. Set up all environment variables
5. Wait for deployment
6. Tell the AI to write your personalised site content

This takes 2-5 minutes. Ready?`);

    if (hasImageGen) {
      this.ui.addButtons([
        { label: 'Build with AI images', action: 'confirm-build-images' },
        { label: 'Build without images', action: 'confirm-build' },
      ]);
    } else {
      this.ui.addButtons([
        { label: 'Build it!', action: 'confirm-build' },
      ]);
    }

    this.ui.onAction = async (action) => {
      if (action === 'confirm-build-images') {
        this._generateImages = true;
        // Ask for image style preferences
        this.ui.addMessage('agent', 'Any preferences for your images? Describe the vibe — e.g. "warm and rustic", "clean and modern", "colourful and playful". Or just hit Enter and I\'ll pick something that suits your business.');
        this.ui.setInputVisible(true, 'e.g. warm and rustic, dark tones...');
        this.state = 'IMAGE_STYLE_PROMPT';
        return;
      }
      this._generateImages = false;
      await this.handleAction(action);
    };
  }

  async doBuildRunning() {
    this.ui.setInputVisible(false);
    const steps = [
      { id: 'github_repo',    label: 'Create GitHub repository' },
      { id: 'push_files',     label: 'Push website files' },
    ];
    if (this._generateImages) {
      steps.push({ id: 'gen_images', label: 'Generate logo & hero image' });
    }
    steps.push(
      { id: 'vercel_project', label: 'Create Vercel project' },
      { id: 'env_vars',       label: 'Configure environment' },
      { id: 'deploy',         label: 'Deploy to Vercel' },
      { id: 'ai_build',       label: 'AI builds your website' },
    );
    this.ui.addProgress(steps);

    try {
      // Step 1: Create GitHub repo
      this.ui.setBuildStep('github_repo', 'running', 'Creating repository...');
      const { repo, url } = await createGitHubRepo(this.githubToken, this.repoName);
      this.repoUrl = url;
      this.ui.setBuildStep('github_repo', 'done', repo);

      await new Promise(r => setTimeout(r, 3000));

      // Step 2: Push site kit
      this.ui.setBuildStep('push_files', 'running', 'Uploading website files...');
      await pushSiteKit(this.githubToken, repo, (done, total, file) => {
        this.ui.setBuildStep('push_files', 'running', `${done}/${total} files`);
      }, this.selectedPages);
      this.ui.setBuildStep('push_files', 'done', 'All files pushed');

      // Step 2b: Generate images (if opted in)
      if (this._generateImages) {
        this.ui.setBuildStep('gen_images', 'running', 'Generating logo...');
        try {
          const info = this.businessInfo || {};
          const name = info.name || 'the business';
          const type = info.type || 'business';
          const location = info.address || '';

          const styleHint = this._imageStyle ? ` Style: ${this._imageStyle}.` : '';
          const logoPrompt = `Create a simple, modern, professional logo icon for "${name}", a ${type}. Clean minimal design, flat style, white background, no text, suitable for a website navigation bar. Square format.${styleHint}`;
          const logoBase64 = await generateImage(logoPrompt);
          await pushImageToRepo(this.githubToken, repo, 'images/logo.png', logoBase64, 'Add AI-generated logo');

          this.ui.setBuildStep('gen_images', 'running', 'Generating hero banner...');
          const heroPrompt = `Create a professional, high-quality hero banner photograph for "${name}", a ${type}${location ? ` in ${location}` : ''}. Wide landscape composition, suitable as a website hero section background image. No text overlay.${styleHint}`;
          const heroBase64 = await generateImage(heroPrompt, '16:9');
          await pushImageToRepo(this.githubToken, repo, 'images/hero.png', heroBase64, 'Add AI-generated hero banner');

          // Set URLs in businessInfo so the AI build naturally uses them
          this.businessInfo.logo_url = '/images/logo.png';
          this.businessInfo.hero_url = '/images/hero.png';
          this.ui.setBuildStep('gen_images', 'done', 'Logo & hero generated');

          // Show image previews in the chat
          this.ui.addMessage('agent', `<div class="chat-card">
<div class="chat-card__title">Your AI-generated images</div>
<div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
  <div style="text-align:center">
    <img src="data:image/png;base64,${logoBase64}" alt="Generated logo" style="width:80px;height:80px;border-radius:8px;border:1px solid var(--border)">
    <div style="font-size:0.8rem;color:var(--text-light);margin-top:4px">Logo</div>
  </div>
  <div style="text-align:center;flex:1;min-width:200px">
    <img src="data:image/png;base64,${heroBase64}" alt="Generated hero" style="width:100%;max-width:400px;border-radius:8px;border:1px solid var(--border)">
    <div style="font-size:0.8rem;color:var(--text-light);margin-top:4px">Hero banner</div>
  </div>
</div>
</div>`, true);
        } catch (imgErr) {
          this.ui.setBuildStep('gen_images', 'error', imgErr.message || 'Skipped — you can add images later');
        }
      }

      // Step 3: Create Vercel project
      this.ui.setBuildStep('vercel_project', 'running', 'Creating Vercel project...');
      this.projectSlug = this.repoName.toLowerCase().replace(/[^a-z0-9-]/g, '-');
      const { projectId } = await createVercelProject(this.vercelToken, this.projectSlug, repo);
      this.projectId = projectId;
      this.ui.setBuildStep('vercel_project', 'done', this.projectSlug);

      // Step 4: Set env vars
      this.ui.setBuildStep('env_vars', 'running', 'Setting environment variables...');
      this.adminToken = generateAdminToken();
      // AI key is set via EON proxy (key never leaves server)
      await setupAIEnvVars(this.vercelToken, this.projectId);
      await setVercelEnvVars(this.vercelToken, this.projectId, [
        { key: 'GITHUB_TOKEN',  value: this.githubToken },
        { key: 'GITHUB_REPO',   value: repo },
        { key: 'GITHUB_BRANCH', value: 'main' },
        { key: 'ADMIN_TOKEN',   value: this.adminToken },
        { key: 'CONTACT_EMAIL', value: this.businessInfo.email || '' },
      ]);
      this.ui.setBuildStep('env_vars', 'done', 'Environment configured');

      // Step 5: Trigger and wait for deployment
      this.ui.setBuildStep('deploy', 'running', 'Triggering Vercel deployment...');
      this.siteUrl = `https://${this.projectSlug}.vercel.app`;
      try {
        const deployResult = await triggerVercelDeploy(this.vercelToken, this.projectSlug, repo);
        this.ui.setBuildStep('deploy', 'running', 'Deployment triggered, waiting for it to go live...');

        // Poll for deployment readiness (up to 3 minutes)
        let deployed = false;
        for (let i = 0; i < 36; i++) {
          await new Promise(r => setTimeout(r, 5000));
          try {
            const r = await fetch(this.siteUrl, { method: 'HEAD' });
            if (r.ok || r.status === 404) {
              // 404 is fine — means Vercel is serving the project, just no index yet
              deployed = true;
              break;
            }
          } catch {}
          this.ui.setBuildStep('deploy', 'running', `Waiting for deployment... (${(i + 1) * 5}s)`);
        }
        this.ui.setBuildStep('deploy', deployed ? 'done' : 'error',
          deployed ? `Live at ${this.siteUrl}` : 'Deployment may still be in progress');
      } catch (deployErr) {
        // Deployment trigger failed — fall back to waiting for auto-deploy
        this.ui.setBuildStep('deploy', 'running', 'Waiting for auto-deployment...');
        let deployed = false;
        for (let i = 0; i < 36; i++) {
          await new Promise(r => setTimeout(r, 5000));
          try {
            const r = await fetch(this.siteUrl, { method: 'HEAD' });
            if (r.ok || r.status === 404) { deployed = true; break; }
          } catch {}
          this.ui.setBuildStep('deploy', 'running', `Waiting... (${(i + 1) * 5}s)`);
        }
        this.ui.setBuildStep('deploy', deployed ? 'done' : 'error',
          deployed ? `Live at ${this.siteUrl}` : 'Deployment may still be in progress');
      }

      // Give Vercel a moment to fully propagate before hitting the API
      await new Promise(r => setTimeout(r, 5000));

      // Step 6: AI builds the site (stepped — one page at a time to stay under 60s)
      this.ui.setBuildStep('ai_build', 'running', 'AI is writing your website...');
      try {
        await triggerSteppedBuild(this.siteUrl, this.adminToken, this.businessInfo, (step, total, label) => {
          if (step < total) {
            this.ui.setBuildStep('ai_build', 'running', `${label} (${step + 1}/${total})...`);
          } else {
            this.ui.setBuildStep('ai_build', 'done', 'Website built!');
          }
        }, this.selectedPages);
      } catch (buildErr) {
        this.ui.setBuildStep('ai_build', 'error', buildErr.message || 'Build can be retried from admin panel');
      }

      await this.enter(STATES.BUILD_COMPLETE);

    } catch (err) {
      this.ui.addMessage('agent', `Something went wrong: <strong>${err.message}</strong>`);
      this.ui.addButtons([
        { label: 'Retry build', action: 'retry-build' },
        { label: 'Start fresh', action: 'start-fresh' },

        } else {
          clearState();

        }
      };
    }
  }

  async doImageUploadProcess() {
    const logoInput = document.getElementById('upload-logo');
    const heroInput = document.getElementById('upload-hero');
    const statusEl = document.getElementById('upload-status');

    const logoFile = logoInput && logoInput.files[0];
    const heroFile = heroInput && heroInput.files[0];

    if (!logoFile && !heroFile) {
      this.ui.addMessage('agent', "No files selected. You can add images later from the admin panel.");
      return this.enter(STATES.DOMAIN_PROMPT);
    }

    if (statusEl) statusEl.innerHTML = '<span style="color:var(--gold)">Uploading...</span>';

    try {
      const uploadFile = async (file, type) => {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('type', type);
        const r = await fetch(`${this.siteUrl}/api/upload`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${this.adminToken}` },
          body: formData
        });
        if (!r.ok) throw new Error(`Upload failed: ${r.status}`);
        return r.json();
      };

      const results = [];
      if (logoFile) {
        results.push(await uploadFile(logoFile, 'logo'));
      }
      if (heroFile) {
        results.push(await uploadFile(heroFile, 'hero'));
      }

      if (statusEl) statusEl.innerHTML = '<span style="color:#2E7D32">Uploaded! Applying to your site...</span>';

      // Tell the agent to apply the images
      const imageUrls = results.map(r => `${r.type}: ${r.url}`).join('\n');
      try {
        const applyMsg = `Images have been uploaded. Apply them to the site:\n${imageUrls}\n\nFor the logo: update the nav__brand in index.html (and all other pages) to include an <img> tag before the text.\nFor the hero: add a background-image style to the .hero section in css/style.css in the AI-GENERATED section.\nKeep all CSS classes and structure intact.`;
        await fetch(`${this.siteUrl}/api/agent`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${this.adminToken}`
          },
          body: JSON.stringify({ mode: 'modify', message: applyMsg, businessInfo: this.businessInfo })
        });
      } catch {}

      this.ui.addMessage('agent', 'Images uploaded and applied to your site!');
    } catch (err) {
      this.ui.addMessage('agent', `Image upload ran into an issue: ${err.message}. No worries — you can add images later from the admin panel.`);
    }

    await this.enter(STATES.DOMAIN_PROMPT);
  }

    const messagesEl = document.getElementById('messages');
