<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildMySite — Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B2A4A;
      --navy-light: #243558;
      --gold: #C5A55A;
      --offwhite: #F8F7F4;
      --white: #FFFFFF;
      --text: #2C2C2C;
      --text-light: #5A5A5A;
      --text-muted: #8A8A8A;
      --teal: #2A7F7F;
      --teal-dark: #1F6363;
      --teal-light: #E8F4F4;
      --border: #E2E0DC;
      --border-light: #EEEDEA;
      --radius: 6px;
      --radius-lg: 12px;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body); font-size: 15px; line-height: 1.6;
      color: var(--text); background: var(--offwhite);
      display: flex; flex-direction: column;
    }
    a { color: var(--teal); text-decoration: none; }
    a:hover { color: var(--teal-dark); text-decoration: underline; }
    code { background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 3px; font-size: 0.88em; }

    /* ---- Header ---- */
    .header {
      background: var(--navy); color: var(--white);
      padding: 16px 24px; flex-shrink: 0;
      display: flex; align-items: center; gap: 16px;
    }
    .header__brand {
      font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700;
      color: var(--white); text-decoration: none;
    }
    .header__brand span { color: var(--gold); }
    .header__sub { font-size: 0.8rem; color: rgba(255,255,255,0.55); }

    /* ---- Progress bar ---- */
    .progress-bar {
      background: var(--navy-light); height: 4px; flex-shrink: 0;
    }
    .progress-bar__fill {
      height: 100%; background: var(--teal); width: 0%;
      transition: width 0.5s ease;
    }

    /* ---- Steps indicator ---- */
    .steps {
      display: flex; justify-content: center; gap: 6px;
      padding: 12px 24px; background: var(--white);
      border-bottom: 1px solid var(--border-light); flex-shrink: 0;
      flex-wrap: wrap;
    }
    .step-pip {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 4px 12px; border-radius: 99px;
      color: var(--text-muted); background: var(--offwhite);
      border: 1px solid var(--border-light); transition: all 0.3s;
    }
    .step-pip--active { color: var(--white); background: var(--teal); border-color: var(--teal); }
    .step-pip--done { color: var(--teal-dark); background: var(--teal-light); border-color: var(--teal); }

    /* ---- Messages area ---- */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 24px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ---- Message bubbles ---- */
    .msg {
      max-width: 560px; padding: 14px 18px; border-radius: var(--radius-lg);
      line-height: 1.65; font-size: 0.92rem; animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg--agent {
      align-self: flex-start; background: var(--white);
      border: 1px solid var(--border-light); color: var(--text);
    }
    .msg--user {
      align-self: flex-end; background: var(--teal); color: var(--white);
      border: 1px solid var(--teal-dark);
    }
    .msg--user a { color: var(--white); text-decoration: underline; }
    .msg--user code { background: rgba(255,255,255,0.2); color: var(--white); }
    .msg p { margin-bottom: 8px; }
    .msg p:last-child { margin-bottom: 0; }
    .msg strong { font-weight: 600; }

    /* ---- Cards inside messages ---- */
    .chat-card {
      background: var(--offwhite); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin: 4px 0;
    }
    .chat-card--success { background: #E8F5E9; border-color: #66BB6A; }
    .chat-card__title {
      font-weight: 700; font-size: 0.95rem; color: var(--navy); margin-bottom: 10px;
    }
    .chat-card__row {
      display: flex; gap: 10px; margin-bottom: 6px; font-size: 0.88rem;
    }
    .chat-card__label {
      font-weight: 600; color: var(--text-muted); min-width: 80px;
      text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.04em;
      padding-top: 2px;
    }
    .chat-card__value { color: var(--text); flex: 1; word-break: break-word; }
    .chat-steps { padding-left: 20px; margin: 8px 0; }
    .chat-steps li { margin-bottom: 6px; font-size: 0.88rem; color: var(--text-light); list-style: decimal; }
    .chat-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; }
    .chat-token {
      display: inline-block; background: var(--white); border: 1px solid var(--border);
      padding: 6px 10px; border-radius: var(--radius); font-family: monospace;
      font-size: 0.85rem; word-break: break-all; user-select: all;
    }
    .copy-btn {
      display: inline-block; margin-left: 8px; padding: 4px 10px; font-size: 0.75rem;
      background: var(--navy); color: var(--white); border: none; border-radius: var(--radius);
      cursor: pointer; font-family: var(--font-body); vertical-align: middle;
    }
    .copy-btn:hover { opacity: 0.85; }
    .chat-dns-table {
      width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.85rem;
    }
    .chat-dns-table th {
      text-align: left; font-weight: 600; color: var(--text-muted);
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 6px 8px; border-bottom: 1px solid var(--border);
    }
    .chat-dns-table td {
      padding: 6px 8px; border-bottom: 1px solid var(--border-light);
    }

    /* ---- Buttons in chat ---- */
    .msg-buttons { display: flex; gap: 8px; flex-wrap: wrap; align-self: flex-start; }
    .msg-btn {
      padding: 10px 20px; border-radius: var(--radius); border: 1px solid var(--teal);
      background: var(--white); color: var(--teal); font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block;
    }
    .msg-btn:hover { background: var(--teal); color: var(--white); text-decoration: none; }
    .msg-btn--primary { background: var(--teal); color: var(--white); }
    .msg-btn--primary:hover { background: var(--teal-dark); }

    /* ---- Build progress ---- */
    .build-progress { margin: 4px 0; align-self: flex-start; max-width: 560px; width: 100%; }
    .build-step {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid var(--border-light); font-size: 0.88rem;
    }
    .build-step:last-child { border-bottom: none; }
    .build-step__icon { width: 20px; height: 20px; flex-shrink: 0; }
    .build-step__icon--pending { color: var(--text-muted); }
    .build-step__icon--running { color: var(--gold); animation: spin 1s linear infinite; }
    .build-step__icon--done { color: #2E7D32; }
    .build-step__icon--error { color: #C62828; }
    .build-step__text { flex: 1; color: var(--text); }
    .build-step__detail { font-size: 0.78rem; color: var(--text-muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Page checklist ---- */
    .page-checklist { display: flex; flex-direction: column; gap: 6px; }
    .page-check {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border-radius: var(--radius); cursor: pointer; transition: background 0.15s;
      font-size: 0.9rem;
    }
    .page-check:hover { background: rgba(0,0,0,0.03); }
    .page-check input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--teal); cursor: pointer;
    }
    .page-check input[type="checkbox"]:disabled { opacity: 0.5; cursor: default; }
    .page-check__label { color: var(--text); font-weight: 500; }

    /* ---- Image upload ---- */
    .image-upload-group { display: flex; flex-direction: column; gap: 16px; }
    .image-upload-field { }
    .image-upload-label {
      display: block; font-weight: 600; font-size: 0.88rem;
      color: var(--navy); margin-bottom: 4px;
    }
    .image-upload-input {
      font-size: 0.85rem; color: var(--text-light);
    }
    .image-upload-hint {
      font-size: 0.78rem; color: var(--text-muted); margin-top: 2px;
    }

    /* ---- Input area ---- */
    .input-area {
      padding: 16px 24px; background: var(--white);
      border-top: 1px solid var(--border-light); flex-shrink: 0;
      display: none;
    }
    .input-area--visible { display: flex; gap: 10px; align-items: center; }
    .input-area__field {
      flex: 1; padding: 12px 16px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 0.95rem; font-family: monospace;
      background: var(--offwhite); color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    .input-area__field:focus { border-color: var(--teal); }
    .input-area__send {
      width: 44px; height: 44px; border: none; border-radius: var(--radius);
      background: var(--teal); color: var(--white); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0;
    }
    .input-area__send:hover { background: var(--teal-dark); }
    .input-area__send svg { width: 20px; height: 20px; }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      .messages { padding: 16px 12px 12px; }
      .msg { max-width: 100%; }
      .header { padding: 12px 16px; }
      .input-area { padding: 12px 12px; }
      .steps { padding: 8px 12px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a class="header__brand" href="https://eonriskservices.com" target="_blank" rel="noopener">
      <span>Build</span>MySite
    </a>
    <span class="header__sub">by EON Risk Services</span>
  </header>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-bar__fill" id="progress-fill"></div>
  </div>

  <!-- Steps indicator -->
  <div class="steps">
    <span class="step-pip step-pip--active" data-step="1">GitHub</span>
    <span class="step-pip" data-step="2">Vercel</span>
    <span class="step-pip" data-step="3">Business</span>
    <span class="step-pip" data-step="4">Pages</span>
    <span class="step-pip" data-step="5">Build</span>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area" id="input-area">
    <input type="text" class="input-area__field" id="input-field" placeholder="Type here..." autocomplete="off" spellcheck="false">
    <button type="button" class="input-area__send" id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>

  <script type="module">
    import { SetupAgent } from './js/setup-agent.js';

    // ---- SVG icons for build steps ----
    const SVG = {
      pending: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>',
      running: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4m10-10h-4M6 12H2m15.07-5.07l-2.83 2.83M9.76 14.24l-2.83 2.83m0-10.14l2.83 2.83m4.48 4.48l2.83 2.83"/></svg>',
      done: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>',
      error: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C62828" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6m0-6l6 6"/></svg>',
    };

    // ---- DOM refs ----
    const messagesEl = document.getElementById('messages');
    const inputArea = document.getElementById('input-area');
    const inputField = document.getElementById('input-field');
    const sendBtn = document.getElementById('send-btn');
    const progressFill = document.getElementById('progress-fill');
    const stepPips = document.querySelectorAll('.step-pip');

    // ---- Scroll to bottom ----
    function scrollBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    // ---- UI interface for the agent ----
    const ui = {
      addMessage(role, html, isRich = false) {
        const div = document.createElement('div');
        div.className = `msg msg--${role}`;
        if (isRich) {
          div.innerHTML = html;
        } else {
          // Convert newlines to paragraphs, allow inline HTML (links, strong)
          const paras = html.split('\n\n').filter(Boolean);
          div.innerHTML = paras.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        }
        messagesEl.appendChild(div);
        scrollBottom();
      },

      addButtons(buttons) {
        const wrap = document.createElement('div');
        wrap.className = 'msg-buttons';
        for (const btn of buttons) {
          const el = document.createElement('button');
          el.className = 'msg-btn' + (buttons.indexOf(btn) === 0 ? ' msg-btn--primary' : '');
          el.textContent = btn.label;
          el.addEventListener('click', () => {
            // Disable all buttons in this group
            wrap.querySelectorAll('.msg-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
            // If URL, open in new tab
            if (btn.url) window.open(btn.url, '_blank', 'noopener');
            // Add user echo
            ui.addMessage('user', btn.label);
            // Trigger action
            if (ui.onAction) ui.onAction(btn.action, btn);
          });
          wrap.appendChild(el);
        }
        messagesEl.appendChild(wrap);
        scrollBottom();
      },

      addProgress(steps) {
        const wrap = document.createElement('div');
        wrap.className = 'build-progress';
        wrap.id = 'build-progress';
        for (const step of steps) {
          wrap.innerHTML += `
            <div class="build-step" data-build="${step.id}">
              <div class="build-step__icon build-step__icon--pending">${SVG.pending}</div>
              <div>
                <div class="build-step__text">${step.label}</div>
                <div class="build-step__detail" data-detail="${step.id}"></div>
              </div>
            </div>`;
        }
        messagesEl.appendChild(wrap);
        scrollBottom();
      },

      setBuildStep(stepId, status, detail) {
        const row = document.querySelector(`[data-build="${stepId}"]`);
        if (!row) return;
        const icon = row.querySelector('.build-step__icon');
        icon.className = `build-step__icon build-step__icon--${status}`;
        icon.innerHTML = SVG[status] || SVG.pending;
        if (detail) {
          const detailEl = row.querySelector(`[data-detail="${stepId}"]`);
          if (detailEl) detailEl.textContent = detail;
        }
        scrollBottom();
      },

      setInputVisible(visible, placeholder) {
        if (visible) {
          inputArea.classList.add('input-area--visible');
          if (placeholder) inputField.placeholder = placeholder;
          inputField.value = '';
          inputField.focus();
        } else {
          inputArea.classList.remove('input-area--visible');
        }
      },

      updateProgress(completedStep) {
        const pct = Math.round((completedStep / 6) * 100);
        progressFill.style.width = pct + '%';
        stepPips.forEach(pip => {
          const n = parseInt(pip.dataset.step);
          pip.classList.remove('step-pip--active', 'step-pip--done');
          if (n < completedStep + 1) pip.classList.add('step-pip--done');
          else if (n === completedStep + 1) pip.classList.add('step-pip--active');
        });
      },

      onAction: null,
    };

    // ---- Wire up agent ----
    const agent = new SetupAgent(ui);

    function sendInput() {
      const value = inputField.value.trim();
      if (!value) return;
      ui.addMessage('user', value);
      inputField.value = '';
      agent.handleInput(value);
    }

    sendBtn.addEventListener('click', sendInput);
    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendInput();
    });

    // ---- Start ----
    agent.start();
  </script>
</body>
</html>
