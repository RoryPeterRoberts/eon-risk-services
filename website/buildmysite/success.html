<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — BuildMySite</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/x-icon" href="../img/favicon.ico">
  <style>
    .success-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .success-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 48px;
      max-width: 520px;
      box-shadow: var(--shadow);
    }
    .success-icon {
      width: 64px;
      height: 64px;
      background: #e6f9f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .success-icon svg { color: #22c55e; }
    .success-card h1 { font-size: 1.5rem; margin-bottom: 12px; }
    .success-card p { color: var(--text-light); margin-bottom: 24px; line-height: 1.6; }
    .success-card .btn { display: inline-block; margin-top: 8px; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav__inner">
      <a href="../index.html" class="nav__brand">EON Risk Services</a>
    </div>
  </nav>

  <section class="success-page">
    <div class="success-card">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>You're upgraded to Pro</h1>
      <p>Your payment was successful. Your site now has unlimited AI edits. Head back to your admin panel to start building.</p>
      <a href="../buildmysite.html" class="btn btn-primary">Back to BuildMySite</a>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <span>&copy; 2026 EON Risk Services Ltd. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
